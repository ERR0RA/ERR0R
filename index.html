<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Revision</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 10px;
    background-color: #f4f4f4;
  }
  .container {
    max-width: 500px;
    width: 100%;
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
  }
  h1 {
    text-align: center;
  }
  select, input, button {
    width: 100%;
    padding: 8px;
    margin: 6px 0;
    box-sizing: border-box;
    border-radius: 5px;
  }
  #diagramImg {
    width: 100%;
    height: auto;
    border:1px solid #ccc;
    margin:10px 0;
  }
  #scoreBoard {
    text-align: center;
    margin-top: 10px;
  }
  .calculator {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    margin-top: 10px;
  }
  .calculator button {
    padding: 15px;
    font-size: 16px;
  }
  #calcDisplay {
    grid-column: span 4;
    padding: 10px;
    font-size: 16px;
    text-align: right;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Maths Revision</h1>

  <select id="topicSelect">
    <option value="probTree">Probability Tree</option>
    <option value="linearSeq">Linear Sequence</option>
    <option value="nonLinearSeq">Non-linear Sequence</option>
    <option value="graphs">Graphs & Charts</option>
    <option value="circles">Circles & Areas</option>
  </select>

  <select id="difficultySelect">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
  </select>

  <button id="newQBtn">New Question</button>

  <img id="diagramImg" src="" alt="Math Diagram">

  <div id="questionText" style="text-align:center; margin:10px 0;"></div>

  <input type="text" id="answerInput" placeholder="Enter your answer">
  <button onclick="checkAnswer()">Submit</button>
  <button onclick="showHint()">Hint</button>

  <div id="scoreBoard">
    Score: <span id="score">0</span> | Level: <span id="level">1</span> | Streak: <span id="streak">0</span>
  </div>

  <!-- Calculator -->
  <div class="calculator">
    <input type="text" id="calcDisplay" disabled>
    <button onclick="appendCalc('7')">7</button>
    <button onclick="appendCalc('8')">8</button>
    <button onclick="appendCalc('9')">9</button>
    <button onclick="appendCalc('/')">/</button>

    <button onclick="appendCalc('4')">4</button>
    <button onclick="appendCalc('5')">5</button>
    <button onclick="appendCalc('6')">6</button>
    <button onclick="appendCalc('*')">*</button>

    <button onclick="appendCalc('1')">1</button>
    <button onclick="appendCalc('2')">2</button>
    <button onclick="appendCalc('3')">3</button>
    <button onclick="appendCalc('-')">-</button>

    <button onclick="appendCalc('0')">0</button>
    <button onclick="appendCalc('.')">.</button>
    <button onclick="calculate()">=</button>
    <button onclick="appendCalc('+')">+</button>

    <button onclick="clearCalc()" style="grid-column: span 4; background:#f88;">Clear</button>
  </div>

</div>

<script>
// ========= GLOBAL VARIABLES =========
let score = 0, level = 1, streak = 0;
let currentAnswer = 0;
let currentQuestion = null;

// ========= QUESTIONS =========
function generateQuestion() {
    const topic = document.getElementById('topicSelect').value;
    const difficulty = document.getElementById('difficultySelect').value;
    const img = document.getElementById('diagramImg');

    if(topic === "probTree") {
        const p = difficulty==="easy"?0.4:difficulty==="medium"?0.5:0.6;
        currentAnswer = +(p*p).toFixed(2);
        currentQuestion = {topic:"probTree", p};
        document.getElementById('questionText').innerText = `Success probability = ${p}. Two successes?`;
        img.src = "images/probability_tree.png";
    }
    else if(topic==="linearSeq") {
        const start = Math.floor(Math.random()*10);
        const diff = Math.floor(Math.random()*5)+1;
        const n = 5;
        currentAnswer = start + (n-1)*diff;
        currentQuestion = {topic:"linearSeq", start, diff, n};
        document.getElementById('questionText').innerText = `Find the ${n}th term of sequence starting at ${start} with difference ${diff}.`;
        img.src = "images/linear_sequence.png";
    }
    else if(topic==="nonLinearSeq") {
        const n = 4;
        currentAnswer = n**2;
        currentQuestion = {topic:"nonLinearSeq", n};
        document.getElementById('questionText').innerText = `Find the ${n}th term of sequence n² (n=1,2,3...)`;
        img.src = "images/nonlinear_sequence.png";
    }
    else if(topic==="graphs") {
        const a = Math.floor(Math.random()*5)+1;
        currentAnswer = a*2;
        currentQuestion = {topic:"graphs", a};
        document.getElementById('questionText').innerText = `y = ${a}x. Find y when x=2.`;
        img.src = "images/graph_example.png";
    }
    else if(topic==="circles") {
        const r = Math.floor(Math.random()*10)+1;
        currentAnswer = +(Math.PI*r*r).toFixed(2);
        currentQuestion = {topic:"circles", r};
        document.getElementById('questionText').innerText = `Find area of circle with radius ${r} (π≈3.1416).`;
        img.src = "images/circle.png";
    }
}

// ========= CHECK ANSWER =========
function checkAnswer() {
    const user = parseFloat(document.getElementById('answerInput').value);
    if(Math.abs(user-currentAnswer)<0.01) {
        alert("Correct!");
        score += 10; streak += 1;
    } else {
        alert(`Wrong! Correct answer: ${currentAnswer}`);
        streak = 0;
    }
    document.getElementById('score').innerText = score;
    document.getElementById('streak').innerText = streak;
    document.getElementById('level').innerText = 1 + Math.floor(score/50);
    document.getElementById('answerInput').value = '';
    generateQuestion();
}

// ========= HINT =========
function showHint() {
    const t = currentQuestion.topic;
    if(t==="probTree") alert("Hint: multiply probabilities along the branches.");
    else if(t==="linearSeq") alert("Hint: nth term = first term + (n-1)×difference.");
    else if(t==="nonLinearSeq") alert("Hint: nth term = n²");
    else if(t==="graphs") alert("Hint: plug x into y=ax");
    else if(t==="circles") alert("Hint: Area = πr²");
}

// ========= CALCULATOR =========
const calcDisplay = document.getElementById('calcDisplay');
function appendCalc(val){calcDisplay.value+=val;}
function clearCalc(){calcDisplay.value='';}
function calculate(){try{calcDisplay.value=eval(calcDisplay.value)}catch{calcDisplay.value='Error';}}

// ========= INITIALIZE =========
document.getElementById('newQBtn').addEventListener('click', generateQuestion);
generateQuestion();
</script>

</body>
</html>
