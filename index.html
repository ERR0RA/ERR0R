<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths quiz</title>
<style>
body { font-family: Arial; padding: 20px; max-width: 600px; margin: auto; background: #f0f0f0; }
h1 { text-align: center; }
button { padding: 10px 20px; margin: 5px 0; font-size: 16px; cursor: pointer; }
.question-box { background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 0 8px rgba(0,0,0,0.1); margin-bottom: 10px; }
.answer-btn { display: block; width: 100%; margin: 5px 0; }
#controls { margin-bottom: 10px; }
</style>
</head>
<body>

<h1>Maths Quiz</h1>

<div id="controls">
  <label for="topic-select">Topic:</label>
  <select id="topic-select" onchange="changeTopic()">
    <option value="all">All</option>
    <option value="arithmetic">Arithmetic</option>
    <option value="algebra">Algebra</option>
    <option value="geometry">Geometry</option>
    <option value="equations">Equations</option>
    <option value="graphs">Graphs</option>
    <option value="loci">Loci</option>
    <option value="ratio">Ratio</option>
    <option value="similar">Similar Shapes</option>
  </select>

  <label>Difficulty:</label>
  <button onclick="setDifficulty('easy')">Easy</button>
  <button onclick="setDifficulty('medium')">Medium</button>
  <button onclick="setDifficulty('hard')">Hard</button>
</div>

<div class="question-box" id="question-box">
  <p id="question-text">Select a topic and difficulty to start!</p>
  <div id="answers"></div>
</div>

<button onclick="nextQuestion()">New Question</button>

<script>
// Questions grouped by topic and difficulty
const questions = {
  arithmetic: {
    easy: [
      { q: "2 + 3 =", a: ["4","5","6","7"], correct: 1 },
      { q: "5 - 1 =", a: ["3","4","5","6"], correct: 1 }
    ],
    medium: [
      { q: "12 ÷ 4 =", a: ["2","3","4","6"], correct: 1 },
      { q: "15 + 7 =", a: ["20","22","23","21"], correct: 1 }
    ],
    hard: [
      { q: "35 × 6 =", a: ["210","200","205","215"], correct: 0 }
    ]
  },
  algebra: {
    easy: [
      { q: "x + 2 = 5, x =", a: ["2","3","4","5"], correct: 1 }
    ],
    medium: [
      { q: "2x - 3 = 7, x =", a: ["4","5","6","7"], correct: 0 }
    ],
    hard: [
      { q: "Factor: x^2 - 9", a: ["(x+3)(x-3)","(x-9)(x+1)","x(x-9)","x^2-3"], correct: 0 }
    ]
  },
  geometry: {
    easy: [
      { q: "Area of square 3×3 =", a: ["6","9","12","15"], correct: 1 }
    ],
    medium: [
      { q: "Perimeter of rectangle 4×7 =", a: ["11","14","22","28"], correct: 2 }
    ],
    hard: [
      { q: "Pythagoras: a=3,b=4,c=?", a: ["5","6","7","8"], correct: 0 }
    ]
  },
  equations: {
    easy: [
      { q: "Solve: x + 5 = 8", a: ["2","3","4","5"], correct: 1 },
      { q: "Solve: 3 + x = 7", a: ["3","4","5","6"], correct: 1 }
    ],
    medium: [
      { q: "Solve: 2x + 3 = 9", a: ["2","3","4","5"], correct: 1 },
      { q: "Solve: 5x - 10 = 15", a: ["3","4","5","6"], correct: 3 }
    ],
    hard: [
      { q: "Solve: 3x + 7 = 19", a: ["4","5","6","7"], correct: 0 }
    ]
  },
  graphs: {
    easy: [
      { q: "What is the y-intercept of y = 2x + 3?", a: ["2","3","0","5"], correct: 1 }
    ],
    medium: [
      { q: "Slope of y = -3x + 4?", a: ["3","-3","4","-4"], correct: 1 }
    ],
    hard: [
      { q: "y = 2x - 5, point (3,?) lies on line, y=?", a: ["1","2","3","4"], correct: 0 }
    ]
  },
  loci: {
    easy: [
      { q: "Locus of points equidistant from two points?", a: ["Circle","Line","Square","Triangle"], correct: 1 }
    ],
    medium: [
      { q: "Locus of points 3cm from a fixed point?", a: ["Circle","Line","Triangle","Rectangle"], correct: 0 }
    ],
    hard: [
      { q: "Locus of points equidistant from two intersecting lines?", a: ["Angle bisector","Circle","Line","Square"], correct: 0 }
    ]
  },
  ratio: {
    easy: [
      { q: "Simplify 4:8", a: ["1:2","2:3","3:4","4:8"], correct: 0 }
    ],
    medium: [
      { q: "Divide 20 in ratio 2:3", a: ["8 & 12","10 & 10","12 & 8","9 & 11"], correct: 0 }
    ],
    hard: [
      { q: "Ratio 5:7, total = 60, first part?", a: ["25","20","30","35"], correct: 1 }
    ]
  },
  similar: {
    easy: [
      { q: "Two similar triangles, sides 3 & 6, ratio?", a: ["1:2","2:1","1:3","3:1"], correct: 0 }
    ],
    medium: [
      { q: "Triangles 5cm & 10cm, ratio of areas?", a: ["1:2","1:4","2:1","4:1"], correct: 1 }
    ],
    hard: [
      { q: "Similar triangles, sides 6 & 9, find missing side if small=4?", a: ["6","5","8","7"], correct: 0 }
    ]
  }
};

let currentTopic = 'all';
let currentDifficulty = null;
let currentQuestions = [];
let askedIndexes = [];

function changeTopic() {
  currentTopic = document.getElementById('topic-select').value;
  loadQuestions();
  nextQuestion();
}

function setDifficulty(diff) {
  currentDifficulty = diff;
  loadQuestions();
  nextQuestion();
}

function loadQuestions() {
  askedIndexes = [];
  if(!currentDifficulty) return;

  if(currentTopic === 'all'){
    currentQuestions = [];
    for(const t in questions){
      if(questions[t][currentDifficulty])
        currentQuestions = currentQuestions.concat(questions[t][currentDifficulty]);
    }
  } else {
    currentQuestions = questions[currentTopic][currentDifficulty] || [];
  }

  if(currentQuestions.length === 0){
    alert("No questions available for this topic & difficulty combination!");
  }
}

function nextQuestion() {
  if(!currentDifficulty){
    alert("Select a difficulty first!");
    return;
  }
  if(currentQuestions.length === 0) return;

  if(askedIndexes.length >= currentQuestions.length){
    alert("You've completed all questions! Restarting...");
    askedIndexes = [];
  }

  let index;
  do{
    index = Math.floor(Math.random() * currentQuestions.length);
  } while(askedIndexes.includes(index));

  askedIndexes.push(index);
  showQuestion(currentQuestions[index]);
}

function showQuestion(qObj){
  const qText = document.getElementById("question-text");
  const answersDiv = document.getElementById("answers");
  qText.textContent = qObj.q;
  answersDiv.innerHTML = "";

  qObj.a.forEach((ans,i)=>{
    const btn = document.createElement("button");
    btn.textContent = ans;
    btn.className = "answer-btn";
    btn.onclick = ()=> checkAnswer(i,qObj.correct);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(selected, correct){
  if(selected === correct){
    alert("✅ Correct!");
  } else {
    alert("❌ Wrong! Try again or press New Question.");
  }
}
</script>

</body>
</html>
