<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Quiz - Fixed</title>
<style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 600px; margin:auto; background: #f0f2f5; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    button { padding: 10px 14px; border: none; border-radius: 8px; background: #e8f0fe; color: #1a73e8; cursor: pointer; font-weight: 600; }
    button.active { background: #1a73e8; color: white; }
    .answer-btn { display: block; width: 100%; text-align: left; margin: 8px 0; background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.2s; }
    .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; }
    .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
    canvas { background: white; border: 1px solid #ccc; border-radius: 8px; width: 100%; display: block; margin: 20px auto; }
    #solution { display: none; padding: 15px; background: #fff3cd; border-left: 5px solid #ffc107; margin-top: 15px; border-radius: 4px; }
    #feedback { font-weight: bold; text-align: center; height: 30px; font-size: 1.2em; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="card">
    <div class="controls" id="diff-btns">
        <button onclick="updateSettings('diff', 'easy', this)" class="active">Easy</button>
        <button onclick="updateSettings('diff', 'medium', this)">Medium</button>
        <button onclick="updateSettings('diff', 'hard', this)">Hard</button>
    </div>
    <div class="controls" id="topic-btns">
        <button onclick="updateSettings('topic', 'arithmetic', this)" class="active">Arithmetic</button>
        <button onclick="updateSettings('topic', 'pythagoras', this)">Pythagoras</button>
        <button onclick="updateSettings('topic', 'geometry', this)">Geometry</button>
    </div>
</div>

<div class="card">
    <div id="feedback"></div>
    <h2 id="question-text">Select a topic...</h2>
    <div id="answers"></div>
    <div id="solution"></div>
    <button id="manual-next" onclick="generateQuestion()" style="display:none; background:#28a745; color:white; width:100%; margin-top:10px; padding:15px;">Next Question →</button>
</div>

<canvas id="mathCanvas" width="400" height="300"></canvas>

<script>
let currentTopic = 'arithmetic', currentDiff = 'easy', currentQuestion = null, wrongCount = 0;

function updateSettings(type, val, btn) {
    if (type === 'diff') currentDiff = val;
    if (type === 'topic') currentTopic = val;
    
    const parentId = type === 'diff' ? 'diff-btns' : 'topic-btns';
    document.querySelectorAll(`#${parentId} button`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    generateQuestion();
}

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1) + min); }

function generateQuestion() {
    wrongCount = 0;
    document.getElementById('solution').style.display = 'none';
    document.getElementById('feedback').textContent = "";
    document.getElementById('manual-next').style.display = 'none';
    
    let qData = { type: 'text' };

    if (currentTopic === 'arithmetic') {
        let n1 = rand(2, 50), n2 = rand(2, 50);
        if (currentDiff === 'easy') { qData.q = `${n1} + ${n2} = ?`; qData.ans = n1 + n2; }
        else if (currentDiff === 'medium') { n1 = rand(5, 12); n2 = rand(5, 12); qData.q = `${n1} × ${n2} = ?`; qData.ans = n1 * n2; }
        else { n1 = rand(100, 500); n2 = rand(2, 9); qData.q = `Remainder of ${n1} ÷ ${n2}?`; qData.ans = n1 % n2; }
        qData.sol = `The correct calculation is ${qData.ans}.`;
    } 
    else if (currentTopic === 'pythagoras') {
        let a = rand(3, 8), b = rand(4, 10);
        qData.ans = Math.sqrt(a*a + b*b).toFixed(1);
        qData.q = `In a right triangle, a=${a} and b=${b}. Find c (to 1 decimal).`;
        qData.type = 'pyth'; qData.a = a; qData.b = b;
        qData.sol = `${a}² + ${b}² = ${a*a + b*b}. Square root is ${qData.ans}.`;
    }
    else if (currentTopic === 'geometry') {
        let r = rand(2, 10);
        qData.q = `Find area of a circle with radius ${r} (Use π=3.14, 1 decimal).`;
        qData.ans = (3.14 * r * r).toFixed(1);
        qData.type = 'circle'; qData.r = r;
        qData.sol = `Area = 3.14 × ${r}² = ${qData.ans}`;
    }

    currentQuestion = qData;
    renderUI(qData);
    draw(qData);
}

function renderUI(q) {
    document.getElementById('question-text').textContent = q.q;
    const container = document.getElementById('answers');
    container.innerHTML = "";

    let opts = [q.ans];
    while(opts.length < 4) {
        let offset = (Math.random() * 10 - 5).toFixed(q.type === 'text' ? 0 : 1);
        let val = (parseFloat(q.ans) + parseFloat(offset)).toFixed(q.type === 'text' ? 0 : 1);
        if(!opts.includes(val) && val >= 0) opts.push(val);
    }
    opts.sort(() => Math.random() - 0.5);

    opts.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'answer-btn';
        b.textContent = opt;
        b.onclick = () => check(b, opt);
        container.appendChild(b);
    });
}

function check(btn, val) {
    const fb = document.getElementById('feedback');
    // Prevent multiple clicks
    if(fb.textContent.includes("Correct")) return;

    if (val == currentQuestion.ans) {
        btn.classList.add('correct');
        fb.innerHTML = "<span style='color:green'>✅ Correct!</span>";
        document.getElementById('manual-next').style.display = 'block';
        setTimeout(generateQuestion, 1500); // Auto-load next
    } else {
        btn.classList.add('wrong');
        btn.disabled = true;
        wrongCount++;
        fb.innerHTML = "<span style='color:red'>❌ Try again</span>";
        if (wrongCount >= 2) {
            document.getElementById('solution').style.display = 'block';
            document.getElementById('solution').innerHTML = `<b>Solution:</b> ${currentQuestion.sol}`;
        }
    }
}

function draw(q) {
    const c = document.getElementById('mathCanvas'), ctx = c.getContext('2d');
    ctx.clearRect(0,0,400,300);
    ctx.strokeStyle = "#333"; ctx.lineWidth = 3;
    if(q.type === 'pyth') {
        ctx.beginPath(); ctx.moveTo(150, 250); ctx.lineTo(150, 100); ctx.lineTo(250, 250); ctx.closePath(); ctx.stroke();
    } else if (q.type === 'circle') {
        ctx.beginPath(); ctx.arc(200, 150, q.r*10, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(200,150); ctx.lineTo(200+q.r*10, 150); ctx.stroke();
    }
}

generateQuestion();
</script>
</body>
<body>
    <H7>This code has been made with a collab with AI and human(s).</H7>
</body>body>
</html>
