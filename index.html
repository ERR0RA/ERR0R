<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Revision</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
padding:10px;
max-width:650px;
margin:auto;
}

h1{
text-align:center;
}

.selector{
margin:10px 0;
}

.question{
margin:20px 0;
font-size:20px;
}

.formula{
color:#555;
font-style:italic;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
font-size:16px;
margin-top:5px;
}

button{
padding:10px;
font-size:16px;
margin:3px;
cursor:pointer;
}

.feedback{
margin-top:10px;
font-weight:bold;
}

.graph{
max-width:100%;
margin-top:10px;
}

.calculator{
display:none;
margin-top:15px;
background:#ddd;
padding:10px;
border-radius:10px;
}

.calc-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:5px;
}

.calc-grid button{
height:45px;
font-size:18px;
}

</style>

</head>

<body>

<h1>Maths Revision</h1>

<div class="selector">
Topic:
<select id="topic">
<option value="all">All</option>
</select>
</div>

<div class="selector">
Difficulty:
<select id="difficulty">
<option value="all">All</option>
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>
</div>

<button id="start">Start Quiz</button>

<div class="question" id="question"></div>
<div class="formula" id="formula"></div>

<img id="graph" class="graph" style="display:none">

<input id="answer" placeholder="Enter answer">

<button id="submit">Submit</button>

<div class="feedback" id="feedback"></div>

<div class="calculator" id="calculator">

<h3>Calculator</h3>

<input id="calcDisplay" readonly>

<div class="calc-grid">

<button onclick="press('7')">7</button> <button onclick="press('8')">8</button> <button onclick="press('9')">9</button> <button onclick="press('/')">÷</button>

<button onclick="press('4')">4</button> <button onclick="press('5')">5</button> <button onclick="press('6')">6</button> <button onclick="press('*')">×</button>

<button onclick="press('1')">1</button> <button onclick="press('2')">2</button> <button onclick="press('3')">3</button> <button onclick="press('-')">−</button>

<button onclick="press('0')">0</button> <button onclick="press('.')">.</button> <button onclick="press('3.1416')">π</button> <button onclick="press('+')">+</button>

<button onclick="clearCalc()">C</button> <button onclick="calculate()">=</button>

</div>

</div>

<script>

const questions=[

{topic:"circle area",difficulty:"easy",text:"Find area of circle radius 5",answer:78.54},
{topic:"circle circumference",difficulty:"medium",text:"Circumference of circle radius 7",answer:43.98},
{topic:"volume cube",difficulty:"easy",text:"Volume of cube side 3",answer:27},

{topic:"ratio",difficulty:"easy",text:"Simplify ratio 10:15",answer:"2:3"},

{topic:"percentages",difficulty:"easy",text:"Find 25% of 200",answer:50},

{topic:"manipulating expressions",difficulty:"medium",text:"Simplify 3x + 5 - 2x + 7",answer:"x+12"},

{topic:"one step equations",difficulty:"easy",text:"Solve 2x + 5 = 11",answer:3},

{topic:"two step equations",difficulty:"medium",text:"Solve 3x - 7 = 8",answer:5},

{topic:"pythagoras",difficulty:"medium",text:"Right triangle sides 3 and 4. Find hypotenuse.",answer:5},

{topic:"bounds",difficulty:"medium",text:"Find lower and upper bounds of 4.5 ± 0.1 (format: lower,upper)",answer:[4.4,4.6]},

{topic:"coordinates",difficulty:"easy",text:"Point A (2,3). Move 3 right and 2 up. New coordinates?",answer:"(5,5)"},

{topic:"graphs",difficulty:"easy",text:"What shape is graph of y=x² ?",answer:"parabola",graph:"graph_x2.png"},

{topic:"loci",difficulty:"easy",text:"Points 3cm from a fixed point form what shape?",answer:"circle",graph:"loci.png"}

]

const formulas={

"circle area":"Area = πr²",
"circle circumference":"Circumference = 2πr",
"volume cube":"Volume = side³",
"ratio":"Divide both numbers by their GCD",
"percentages":"(percent ÷ 100) × number",
"manipulating expressions":"Combine like terms",
"one step equations":"Use inverse operation",
"two step equations":"Undo addition then division",
"pythagoras":"c² = a² + b²",
"bounds":"lower=value-error upper=value+error",
"coordinates":"Adjust x and y",
"graphs":"Plot y against x",
"loci":"Set of points meeting a condition"

}

let filtered=[]
let index=0
let score=0

const topicSelect=document.getElementById("topic")

const topics=[...new Set(questions.map(q=>q.topic))]

topics.forEach(t=>{
let o=document.createElement("option")
o.value=t
o.textContent=t
topicSelect.appendChild(o)
})

document.getElementById("start").onclick=()=>{

let t=topicSelect.value
let d=document.getElementById("difficulty").value

filtered=questions.filter(q=>
(t==="all"||q.topic===t)&&
(d==="all"||q.difficulty===d)
)

if(filtered.length===0){
alert("No questions")
return
}

index=0
score=0

show()

}

function show(){

let q=filtered[index]

document.getElementById("question").textContent=q.text
document.getElementById("formula").textContent=formulas[q.topic]||""
document.getElementById("answer").value=""
document.getElementById("feedback").textContent=""

let g=document.getElementById("graph")

if(q.graph){
g.src=q.graph
g.style.display="block"
}else{
g.style.display="none"
}

if(q.difficulty==="hard"||typeof q.answer==="number"){
document.getElementById("calculator").style.display="block"
}else{
document.getElementById("calculator").style.display="none"
}

}

document.getElementById("submit").onclick=()=>{

let q=filtered[index]
let user=document.getElementById("answer").value.trim()

let correct=false

if(Array.isArray(q.answer)){

let parts=user.split(",").map(x=>parseFloat(x))
correct=parts.length===2 &&
Math.abs(parts[0]-q.answer[0])<0.01 &&
Math.abs(parts[1]-q.answer[1])<0.01

}

else if(typeof q.answer==="number"){

let num=parseFloat(user)

correct=Math.abs(num-q.answer)<0.01

}

else{

correct=user.replace(/\s/g,"").toLowerCase()===q.answer.toLowerCase()

}

if(correct){
score++
document.getElementById("feedback").textContent="✅ Correct"
}else{
document.getElementById("feedback").textContent="❌ Correct answer: "+q.answer
}

index++

if(index<filtered.length){

setTimeout(show,1200)

}else{

setTimeout(()=>{
let percent=((score/filtered.length)*100).toFixed(1)
alert("Quiz finished\nScore: "+score+"/"+filtered.length+" ("+percent+"%)")
},1200)

}

}

function press(v){
document.getElementById("calcDisplay").value+=v
}

function clearCalc(){
document.getElementById("calcDisplay").value=""
}

function calculate(){

try{

let result=eval(document.getElementById("calcDisplay").value)

document.getElementById("calcDisplay").value=result.toFixed(2)

}catch{

document.getElementById("calcDisplay").value="Error"

}

}

</script>

</body>
</html>
