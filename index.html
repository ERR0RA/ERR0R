<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate GCSE Maths Trainer</title>

<style>

body{
font-family:Arial;
background:#e8eef7;
text-align:center;
padding:20px;
}

.container{
background:white;
max-width:1100px;
margin:auto;
padding:30px;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

select,input,button{
padding:10px;
margin:6px;
font-size:16px;
border-radius:6px;
}

button{
cursor:pointer;
}

.question{
font-size:22px;
margin:15px;
}

canvas{
border:1px solid #ccc;
margin-top:15px;
}

.correct{color:green;font-weight:bold}
.wrong{color:red;font-weight:bold}

.stats{
font-size:18px;
margin-top:10px;
}

#solution{
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Ultimate GCSE Maths Trainer</h1>

<select id="topic">

<option value="pythagoras">Pythagoras</option>
<option value="trig">Trigonometry</option>
<option value="quadratic">Quadratic Equations</option>
<option value="probability">Probability Tree</option>
<option value="graphClick">Click Graph Point</option>
<option value="functions">Functions</option>

</select>

<button onclick="generateQuestion()">New Question</button>

<div class="question" id="question"></div>

<canvas id="diagram" width="500" height="320"></canvas>

<br>

<input id="answer" placeholder="Answer">

<br>

<button onclick="checkAnswer()">Submit</button>
<button onclick="showHint()">Hint</button>

<div id="hint"></div>
<div id="feedback"></div>
<div id="solution"></div>

<div class="stats">
Score: <span id="score">0</span> |
Level: <span id="level">1</span> |
XP: <span id="xp">0</span> |
🔥 Streak: <span id="streak">0</span>
</div>

</div>

<script>

/* STATE */

let answer
let hint
let solution
let wrongAttempts=0

let score=localStorage.getItem("score")||0
let xp=localStorage.getItem("xp")||0
let level=localStorage.getItem("level")||1
let streak=localStorage.getItem("streak")||0

document.getElementById("score").innerText=score
document.getElementById("xp").innerText=xp
document.getElementById("level").innerText=level
document.getElementById("streak").innerText=streak

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

function clearCanvas(){
let c=document.getElementById("diagram")
let ctx=c.getContext("2d")
ctx.clearRect(0,0,c.width,c.height)
}

/* GENERATE QUESTION */

function generateQuestion(){

wrongAttempts=0
document.getElementById("feedback").innerHTML=""
document.getElementById("solution").innerHTML=""
document.getElementById("hint").innerHTML=""
document.getElementById("answer").value=""

clearCanvas()

let topic=document.getElementById("topic").value
let q=document.getElementById("question")

/* PYTHAGORAS */

if(topic=="pythagoras"){

let a=rand(3,10)
let b=rand(3,10)

q.innerHTML=`Right triangle sides ${a} and ${b}. Find hypotenuse.`

answer=Math.sqrt(a*a+b*b).toFixed(2)

hint="Use a² + b² = c²"

solution=`√(${a}² + ${b}²) = ${answer}`

drawTriangle(a,b)

}

/* TRIG */

if(topic=="trig"){

let adj=rand(4,10)
let hyp=rand(adj+1,15)

q.innerHTML=`Adjacent=${adj}, Hypotenuse=${hyp}. Find cos θ.`

answer=(adj/hyp).toFixed(2)

hint="cosθ = adjacent/hypotenuse"

solution=`${adj}/${hyp} = ${answer}`

drawTriangle(adj,Math.sqrt(hyp*hyp-adj*adj))

}

/* QUADRATIC */

if(topic=="quadratic"){

let r1=rand(1,5)
let r2=rand(1,5)

let b=-(r1+r2)
let c=r1*r2

q.innerHTML=`Solve x² ${b>=0?"+":""}${b}x + ${c} = 0`

answer=`${r1},${r2}`

hint="Factorise the quadratic."

solution=`(x-${r1})(x-${r2}) = 0`

}

/* PROBABILITY TREE */

if(topic=="probability"){

let p=rand(2,8)/10

q.innerHTML=`Probability of success = ${p}.  
Find probability of two successes.`

answer=(p*p).toFixed(2)

hint="Multiply probabilities."

solution=`${p} × ${p} = ${answer}`

drawTree()

}

/* GRAPH CLICK */

if(topic=="graphClick"){

drawGrid()

let x=rand(1,5)
let y=2*x+1

answer=`${x},${y}`

q.innerHTML=`Click the point (${x},${y}) on the graph.`

document.getElementById("diagram").onclick=function(e){

let rect=this.getBoundingClientRect()

let cx=Math.round((e.clientX-rect.left-250)/20)
let cy=Math.round((150-(e.clientY-rect.top))/20)

if(cx==x && cy==y){

correct()

}

}

hint="Use coordinates (x,y)."

solution=`Point is (${x},${y})`

}

/* FUNCTIONS */

if(topic=="functions"){

let x=rand(2,6)

q.innerHTML=`f(x)=x²+2x+1. Find f(${x}).`

answer=(x*x+2*x+1)

hint="Substitute x."

solution=`${x}² + 2(${x}) +1 = ${answer}`

drawParabola()

}

}

/* CHECK ANSWER */

function checkAnswer(){

let user=document.getElementById("answer").value.replace(" ","")

if(user==answer || Math.abs(user-answer)<0.01){

correct()

}else{

wrongAttempts++
streak=0

document.getElementById("feedback").innerHTML="<span class='wrong'>Incorrect</span>"

if(wrongAttempts>=3){
document.getElementById("solution").innerHTML="<b>Solution:</b><br>"+solution
}

saveStats()

}

}

function correct(){

document.getElementById("feedback").innerHTML="<span class='correct'>Correct</span>"

score++
streak++
xp=parseInt(xp)+10

if(xp>=100){
level++
xp=0
}

saveStats()

}

/* HINT */

function showHint(){
document.getElementById("hint").innerHTML="<b>Hint:</b> "+hint
}

/* SAVE */

function saveStats(){

localStorage.setItem("score",score)
localStorage.setItem("xp",xp)
localStorage.setItem("level",level)
localStorage.setItem("streak",streak)

document.getElementById("score").innerText=score
document.getElementById("xp").innerText=xp
document.getElementById("level").innerText=level
document.getElementById("streak").innerText=streak

}

/* DRAWING FUNCTIONS */

function drawTriangle(a,b){

let ctx=document.getElementById("diagram").getContext("2d")

ctx.beginPath()
ctx.moveTo(80,250)
ctx.lineTo(80+a*15,250)
ctx.lineTo(80+a*15,250-b*15)
ctx.closePath()
ctx.stroke()

}

function drawGrid(){

let ctx=document.getElementById("diagram").getContext("2d")

for(let i=0;i<500;i+=20){

ctx.moveTo(i,0)
ctx.lineTo(i,320)
ctx.stroke()

ctx.moveTo(0,i)
ctx.lineTo(500,i)
ctx.stroke()

}

}

function drawParabola(){

let ctx=document.getElementById("diagram").getContext("2d")

ctx.beginPath()

for(let x=-10;x<=10;x++){

let y=x*x

ctx.lineTo(250+x*20,250-y*2)

}

ctx.stroke()

}

function drawTree(){

let ctx=document.getElementById("diagram").getContext("2d")

ctx.beginPath()

ctx.moveTo(100,150)
ctx.lineTo(200,100)

ctx.moveTo(100,150)
ctx.lineTo(200,200)

ctx.moveTo(200,100)
ctx.lineTo(300,70)

ctx.moveTo(200,100)
ctx.lineTo(300,130)

ctx.moveTo(200,200)
ctx.lineTo(300,170)

ctx.moveTo(200,200)
ctx.lineTo(300,230)

ctx.stroke()

}

generateQuestion()

</script>

</body>
</html>
