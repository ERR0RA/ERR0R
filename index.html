<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math App</title>
<style>
    body {
        font-family: Arial, sans-serif;
        padding: 10px;
        background-color: #f7f7f7;
        max-width: 500px;
        margin: auto;
    }
    h1 { text-align: center; }
    .question { margin: 20px 0; }
    .calculator { display: none; margin: 10px 0; }
    input { padding: 8px; font-size: 16px; width: 100%; margin-bottom: 10px; }
    button { padding: 10px; font-size: 16px; cursor: pointer; }
    .feedback { font-weight: bold; margin-top: 10px; }
</style>
</head>
<body>

<h1>Math App</h1>
<div id="question-container" class="question"></div>
<input type="text" id="answer-input" placeholder="Type your answer here">
<button id="submit-answer">Submit Answer</button>

<div class="calculator" id="calculator">
    <h3>Calculator</h3>
    <input type="text" id="calc-display" readonly>
    <br>
    <button onclick="calcPress('1')">1</button>
    <button onclick="calcPress('2')">2</button>
    <button onclick="calcPress('3')">3</button>
    <button onclick="calcPress('+')">+</button>
    <br>
    <button onclick="calcPress('4')">4</button>
    <button onclick="calcPress('5')">5</button>
    <button onclick="calcPress('6')">6</button>
    <button onclick="calcPress('-')">-</button>
    <br>
    <button onclick="calcPress('7')">7</button>
    <button onclick="calcPress('8')">8</button>
    <button onclick="calcPress('9')">9</button>
    <button onclick="calcPress('*')">*</button>
    <br>
    <button onclick="calcPress('0')">0</button>
    <button onclick="calcClear()">C</button>
    <button onclick="calcEvaluate()">=</button>
    <button onclick="calcPress('/')">/</button>
</div>

<div class="feedback" id="feedback"></div>

<script>
// Sample questions
const questions = [
    { text: "Find the area of a circle with radius 5", answer: 78.54, difficulty: "easy" },
    { text: "Calculate the circumference of a circle with radius 7", answer: 43.96, difficulty: "medium" },
    { text: "Solve 45 * 23 + 12", answer: 1037, difficulty: "hard" },
    { text: "What is 12 + 8?", answer: 20, difficulty: "easy" },
];

let currentIndex = 0;
let scores = [];

// Show question
function showQuestion() {
    const q = questions[currentIndex];
    document.getElementById("question-container").innerText = q.text;
    document.getElementById("answer-input").value = "";
    document.getElementById("feedback").innerText = "";
    
    // Show calculator logic
    if (shouldShowCalculator(q)) {
        document.getElementById("calculator").style.display = "block";
    } else {
        document.getElementById("calculator").style.display = "none";
    }
}

// Calculator functions
function calcPress(val) {
    document.getElementById("calc-display").value += val;
}

function calcClear() {
    document.getElementById("calc-display").value = "";
}

function calcEvaluate() {
    try {
        const result = eval(document.getElementById("calc-display").value);
        document.getElementById("calc-display").value = result;
    } catch {
        document.getElementById("calc-display").value = "Error";
    }
}

// Calculator display logic
function shouldShowCalculator(question) {
    const text = question.text.toLowerCase();
    if (question.difficulty === "hard") return true;
    if ((text.includes("circle") && text.includes("area")) || 
        (text.includes("circle") && text.includes("circumference"))) return true;
    return false;
}

// Submit answer
document.getElementById("submit-answer").addEventListener("click", () => {
    const q = questions[currentIndex];
    const userAnswer = parseFloat(document.getElementById("answer-input").value);
    let correct = Math.abs(userAnswer - q.answer) < 0.01; // Allow minor decimal difference
    scores.push(correct ? 1 : 0);

    document.getElementById("feedback").innerText = correct ? "✅ Correct!" : `❌ Wrong! Correct: ${q.answer}`;
    
    // Send data to GitHub when online
    if (navigator.onLine) {
        sendScoresToGitHub(scores);
    }

    // Next question
    currentIndex++;
    if (currentIndex < questions.length) {
        setTimeout(showQuestion, 1000);
    } else {
        setTimeout(() => {
            const avg = (scores.reduce((a,b)=>a+b,0)/scores.length*100).toFixed(1);
            alert(`All done! Score: ${scores.length}/${questions.length} (${avg}%)`);
        }, 1000);
    }
});

// Dummy function to send scores to GitHub
function sendScoresToGitHub(scores) {
    // Replace this with your GitHub API logic
    console.log("Sending scores to GitHub:", scores);
}

// Initial load
showQuestion();
</script>

</body>
</html>
