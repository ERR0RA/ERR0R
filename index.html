<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths revision</title>
<style>
body { font-family: Arial; padding: 10px; max-width: 600px; margin: auto; background: #f7f7f7; }
h1 { text-align: center; }
.selector { margin: 10px 0; }
.question { margin: 20px 0; }
.formula { font-style: italic; color: #555; margin-bottom: 10px; }
.calculator { display: none; margin: 10px 0; }
input { padding: 8px; font-size: 16px; width: 100%; margin-bottom: 10px; }
button { padding: 10px; font-size: 16px; cursor: pointer; margin: 2px; }
.feedback { font-weight: bold; margin-top: 10px; }
.graph-img { max-width: 100%; margin-top: 10px; }
</style>
</head>
<body>

<h1>Ultimate Math App</h1>

<div class="selector">
  <label for="topic-select">Choose Topic:</label>
  <select id="topic-select"><option value="all">All Topics</option></select>
</div>

<div class="selector">
  <label for="difficulty-select">Choose Difficulty:</label>
  <select id="difficulty-select">
    <option value="all">All</option>
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
  </select>
</div>

<button id="start-topic">Start</button>

<div id="question-container" class="question"></div>
<div id="formula" class="formula"></div>
<img id="graph-image" class="graph-img" src="" style="display:none;">
<input type="text" id="answer-input" placeholder="Type your answer here">
<button id="submit-answer">Submit Answer</button>

<div class="calculator" id="calculator">
<h3>Calculator</h3>
<input type="text" id="calc-display" readonly><br>
<button onclick="calcPress('1')">1</button>
<button onclick="calcPress('2')">2</button>
<button onclick="calcPress('3')">3</button>
<button onclick="calcPress('+')">+</button><br>
<button onclick="calcPress('4')">4</button>
<button onclick="calcPress('5')">5</button>
<button onclick="calcPress('6')">6</button>
<button onclick="calcPress('-')">-</button><br>
<button onclick="calcPress('7')">7</button>
<button onclick="calcPress('8')">8</button>
<button onclick="calcPress('9')">9</button>
<button onclick="calcPress('*')">*</button><br>
<button onclick="calcPress('0')">0</button>
<button onclick="calcPress('/')">/</button>
<button onclick="calcPress(Math.PI)">π</button>
<button onclick="calcClear()">C</button>
<button onclick="calcEvaluate()">=</button>
</div>

<div class="feedback" id="feedback"></div>

<script>
// ====== Question Data ======
const questions = [
    { text: "Find the area of a circle with radius 5", answer: 78.54, difficulty: "easy", topic: "circle area" },
    { text: "Calculate the circumference of a circle with radius 7", answer: 43.96, difficulty: "medium", topic: "circle circumference" },
    { text: "Volume of a cube with side 3", answer: 27, difficulty: "medium", topic: "volume cube" },
    { text: "Simplify ratio 10:15", answer: 0.67, difficulty: "medium", topic: "ratio" },
    { text: "Find 25% of 200", answer: 50, difficulty: "easy", topic: "percentages" },
    { text: "Simplify 3x + 5 - 2x + 7", answer: "x + 12", difficulty: "medium", topic: "manipulating expressions" },
    { text: "Solve 2x + 5 = 11", answer: 3, difficulty: "easy", topic: "one-step equations" },
    { text: "Solve 3x - 7 = 8", answer: 5, difficulty: "medium", topic: "two-step equations" },
    { text: "Find the hypotenuse of a right triangle with sides 3 and 4", answer: 5, difficulty: "medium", topic: "pythagoras" },
    { text: "Find the upper and lower bounds of 4.5 ± 0.1", answer: [4.4,4.6], difficulty: "medium", topic: "bounds" },
    { text: "Draw the graph of y = x²", answer: "", difficulty: "easy", topic: "graphs", graph: "graph_y_equals_x2.png" },
    { text: "Point A is at (2,3). Find coordinates of B moved 3 right and 2 up.", answer: "(5,5)", difficulty: "medium", topic: "coordinates" },
    { text: "Draw loci of points 3cm from a fixed point", answer: "", difficulty: "easy", topic: "loci", graph: "loci_circle.png" }
];

// ====== Formula hints ======
const formulas = {
    "circle area": "Area = π × r²",
    "circle circumference": "Circumference = 2 × π × r",
    "volume cube": "Volume = side³",
    "ratio": "Simplify ratio a:b by dividing both by GCD",
    "percentages": "Percentage × total ÷ 100",
    "manipulating expressions": "Combine like terms, expand brackets",
    "one-step equations": "x = value after inverse operation",
    "two-step equations": "Undo addition/subtraction first, then multiplication/division",
    "pythagoras": "c² = a² + b²",
    "bounds": "Upper bound = value + error, Lower bound = value - error",
    "loci": "Loci = set of points satisfying given conditions",
    "graphs": "Plot y against x as per the function",
    "coordinates": "Add/subtract x and y values as per movement"
};

// ====== Calculator topics ======
const calculatorTopics = ["area","circumference","perimeter","volume","surface area","algebra","ratio","percentages","manipulating expressions","one-step equations","two-step equations","pythagoras","bounds"];

let filteredQuestions = [];
let currentIndex = 0;
let scores = [];

// ====== Populate topic dropdown ======
const topicSelect = document.getElementById("topic-select");
[...new Set(questions.map(q=>q.topic))].forEach(t=>{
    const option = document.createElement("option");
    option.value = t;
    option.innerText = t.charAt(0).toUpperCase() + t.slice(1);
    topicSelect.appendChild(option);
});

// ====== Start quiz by topic & difficulty ======
document.getElementById("start-topic").addEventListener("click", ()=>{
    const selectedTopic = topicSelect.value;
    const selectedDifficulty = document.getElementById("difficulty-select").value;
    filteredQuestions = questions.filter(q=>{
        return (selectedTopic==="all" || q.topic===selectedTopic) &&
               (selectedDifficulty==="all" || q.difficulty===selectedDifficulty);
    });
    if(filteredQuestions.length===0){ alert("No questions for this selection!"); return; }
    currentIndex=0; scores=[];
    showQuestion();
});

// ====== Show question ======
function showQuestion(){
    const q = filteredQuestions[currentIndex];
    document.getElementById("question-container").innerText = q.text;
    document.getElementById("answer-input").value = "";
    document.getElementById("feedback").innerText = "";
    document.getElementById("formula").innerText = formulas[q.topic] || "";
    const graphImg = document.getElementById("graph-image");
    if(q.graph){ graphImg.src=q.graph; graphImg.style.display="block"; } 
    else{ graphImg.style.display="none"; }
    if(shouldShowCalculator(q)){ document.getElementById("calculator").style.display="block"; } 
    else{ document.getElementById("calculator").style.display="none"; }
}

// ====== Calculator ======
function calcPress(val){ document.getElementById("calc-display").value+=val; }
function calcClear(){ document.getElementById("calc-display").value=""; }
function calcEvaluate(){ 
    try{ const result=eval(document.getElementById("calc-display").value); 
        document.getElementById("calc-display").value=result.toFixed(2);
    }catch{ document.getElementById("calc-display").value="Error"; }
}
function shouldShowCalculator(question){
    if(question.difficulty==="hard") return true;
    return calculatorTopics.some(topic=>question.text.toLowerCase().includes(topic));
}

// ====== Submit answer ======
document.getElementById("submit-answer").addEventListener("click", ()=>{
    const q=filteredQuestions[currentIndex];
    let userAnswer=document.getElementById("answer-input").value.trim();
    if(Array.isArray(q.answer)){ userAnswer=userAnswer.split(',').map(n=>parseFloat(n.trim())); }
    else if(typeof q.answer==="number"){ userAnswer=parseFloat(parseFloat(userAnswer).toFixed(2)); }
    let correct=false;
    if(Array.isArray(q.answer)){ correct=userAnswer.length===q.answer.length && userAnswer.every((n,i)=>Math.abs(n-q.answer[i])<0.01); }
    else if(typeof q.answer==="number"){ correct=Math.abs(userAnswer-q.answer)<0.01; }
    else{ correct=userAnswer.replace(/\s+/g,'')===q.answer.replace(/\s+/g,''); }
    scores.push(correct?1:0);
    document.getElementById("feedback").innerText=correct?"✅ Correct!":`❌ Wrong! Correct: ${Array.isArray(q.answer)?q.answer.join(', '):q.answer}`;
    if(navigator.onLine) sendScoresToGitHub(scores);
    currentIndex++;
    if(currentIndex<filteredQuestions.length){ setTimeout(showQuestion,1000); }
    else{ setTimeout(()=>{ const avg=(scores.reduce((a,b)=>a+b,0)/scores.length*100).toFixed(1); alert(`All done! Score: ${scores.length}/${filteredQuestions.length} (${avg}%)`); },1000); }
});

// ====== Dummy GitHub ======
function sendScoresToGitHub(scores){ console.log("Sending scores to GitHub:", scores); }

</script>
</body>
</html>
