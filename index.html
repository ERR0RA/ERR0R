<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Maths Revision</title>

<style>

body{
font-family:Arial;
background:#eef2f8;
text-align:center;
padding:20px;
}

.container{
background:white;
max-width:1100px;
margin:auto;
padding:30px;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

select,input,button{
padding:10px;
margin:6px;
font-size:16px;
border-radius:6px;
}

.question{
font-size:22px;
margin:15px;
}

canvas{
border:1px solid #ccc;
margin-top:15px;
}

.correct{color:green;font-weight:bold}
.wrong{color:red;font-weight:bold}

.stats{
font-size:18px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Maths Revision</h1>

<select id="topic">

<option value="expand">Expand Algebra</option>
<option value="factor">Factorise</option>
<option value="quadratic">Quadratic Roots</option>

<option value="fraction">Simplify Fractions</option>
<option value="ratio">Ratio</option>

<option value="linearSeq">Linear Sequence</option>
<option value="nonlinearSeq">Nonlinear Sequence</option>

<option value="similar">Similar Shapes</option>
<option value="circle">Circle Area</option>
<option value="sector">Arc Length</option>

<option value="pythagoras">Pythagoras</option>
<option value="trig">Trigonometry</option>

<option value="probability">Experimental Probability</option>
<option value="tree">Probability Tree</option>

<option value="barchart">Bar Chart</option>
<option value="piechart">Pie Chart</option>

<option value="graph">Graph Question</option>
<option value="function">Functions</option>

</select>

<label>Difficulty</label>

<select id="difficulty">

<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>

</select>

<br>

<button onclick="generateQuestion()">New Question</button>

<div class="question" id="question"></div>

<canvas id="diagram" width="500" height="320"></canvas>

<br>

<input id="answer" placeholder="Answer">

<br>

<button onclick="checkAnswer()">Submit</button>
<button onclick="showHint()">Hint</button>

<div id="hint"></div>
<div id="feedback"></div>
<div id="solution"></div>

<div class="stats">

Score: <span id="score">0</span> |
Level: <span id="level">1</span> |
XP: <span id="xp">0</span> |
🔥 Streak: <span id="streak">0</span>

</div>

</div>

<script>

/* STATE */

let answer
let hint
let solution
let wrong=0

let score=localStorage.getItem("score")||0
let xp=localStorage.getItem("xp")||0
let level=localStorage.getItem("level")||1
let streak=localStorage.getItem("streak")||0

updateStats()

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

function clearCanvas(){
let ctx=document.getElementById("diagram").getContext("2d")
ctx.clearRect(0,0,500,320)
}

/* GENERATE */

function generateQuestion(){

wrong=0
clearCanvas()

document.getElementById("hint").innerHTML=""
document.getElementById("solution").innerHTML=""
document.getElementById("feedback").innerHTML=""
document.getElementById("answer").value=""

let topic=document.getElementById("topic").value
let q=document.getElementById("question")

/* EXPAND */

if(topic=="expand"){

let a=rand(1,5)
let b=rand(1,5)

q.innerHTML=`Expand: (${a}x + ${b})²`

answer=`${a*a}x^2+${2*a*b}x+${b*b}`

hint="Use (a+b)² formula."

solution=`${a*a}x² + ${2*a*b}x + ${b*b}`

}

/* FACTOR */

if(topic=="factor"){

let a=rand(2,5)
let b=rand(2,5)

q.innerHTML=`Factorise: ${a*b}x + ${a*b*2}`

answer=`${a}(${b}x+${b*2})`

hint="Find common factor."

solution=`${a}(${b}x + ${b*2})`

}

/* FRACTION */

if(topic=="fraction"){

let n=rand(10,40)
let d=rand(2,10)

let g=gcd(n,d)

q.innerHTML=`Simplify ${n}/${d}`

answer=`${n/g}/${d/g}`

hint="Divide by the highest common factor."

solution=`HCF=${g}`

}

/* RATIO */

if(topic=="ratio"){

let a=rand(2,5)
let b=rand(2,5)

q.innerHTML=`Share 60 in ratio ${a}:${b}`

answer=(60*a/(a+b)).toFixed(2)

hint="Find total parts."

solution=`60 × ${a}/(${a+b})`

}

/* LINEAR SEQ */

if(topic=="linearSeq"){

let a=rand(1,5)
let d=rand(2,6)

q.innerHTML=`${a}, ${a+d}, ${a+2*d}, ... Find 10th term`

answer=a+9*d

hint="Use a+(n-1)d"

solution=`${a}+9×${d}`

}

/* NONLINEAR */

if(topic=="nonlinearSeq"){

q.innerHTML="1,4,9,16... Find 12th term"

answer=144

hint="Square numbers"

solution="12²=144"

}

/* SIMILAR */

if(topic=="similar"){

let scale=rand(2,5)
let length=rand(4,10)

q.innerHTML=`Scale factor ${scale}, original ${length}cm`

answer=(length*scale)

hint="Multiply by scale factor"

solution=`${length}×${scale}`

}

/* CIRCLE */

if(topic=="circle"){

let r=rand(3,10)

q.innerHTML=`Radius ${r}. Find area (2dp)`

answer=(Math.PI*r*r).toFixed(2)

hint="πr²"

solution=`π × ${r}²`

drawCircle(r)

}

/* ARC */

if(topic=="sector"){

let r=rand(4,8)
let angle=rand(30,120)

q.innerHTML=`Radius ${r}, angle ${angle}. Arc length?`

answer=((angle/360)*2*Math.PI*r).toFixed(2)

hint="(θ/360)×2πr"

solution="Arc formula"

drawSector(r,angle)

}

/* PYTHAGORAS */

if(topic=="pythagoras"){

let a=rand(3,8)
let b=rand(3,8)

q.innerHTML=`Sides ${a},${b}. Hypotenuse?`

answer=Math.sqrt(a*a+b*b).toFixed(2)

hint="a²+b²=c²"

solution="Use square root"

drawTriangle(a,b)

}

/* TRIG */

if(topic=="trig"){

let adj=rand(4,10)
let hyp=rand(adj+1,15)

q.innerHTML=`adj=${adj}, hyp=${hyp}. cosθ?`

answer=(adj/hyp).toFixed(2)

hint="cos=adj/hyp"

solution=`${adj}/${hyp}`

}

/* BAR CHART */

if(topic=="barchart"){

let values=[rand(2,10),rand(2,10),rand(2,10)]

drawBars(values)

q.innerHTML="Total of bars?"

answer=values[0]+values[1]+values[2]

hint="Add values"

solution=answer

}

/* PIE */

if(topic=="piechart"){

drawPie()

q.innerHTML="If total=80, quarter section?"

answer=20

hint="Divide by 4"

solution="80/4"

}

/* GRAPH */

if(topic=="graph"){

drawGrid()

let x=rand(1,5)
let y=2*x+1

answer=`${x},${y}`

q.innerHTML=`Click point (${x},${y})`

document.getElementById("diagram").onclick=function(e){

let rect=this.getBoundingClientRect()

let cx=Math.round((e.clientX-rect.left-250)/20)
let cy=Math.round((150-(e.clientY-rect.top))/20)

if(cx==x && cy==y){
correct()
}

}

}

/* FUNCTION */

if(topic=="function"){

let x=rand(2,5)

q.innerHTML=`f(x)=x²+3. f(${x})?`

answer=x*x+3

hint="Substitute x"

solution=answer

}

/* PROBABILITY */

if(topic=="probability"){

let s=rand(3,10)
let t=rand(10,20)

q.innerHTML=`${s} successes in ${t}. Probability?`

answer=(s/t).toFixed(2)

hint="success/total"

solution=`${s}/${t}`

}

/* TREE */

if(topic=="tree"){

let p=0.4

q.innerHTML="Success probability=0.4. Two successes?"

answer=(p*p).toFixed(2)

hint="Multiply probabilities"

solution="0.4×0.4"

drawTree()

}

}

/* CHECK */

function checkAnswer(){

let user=document.getElementById("answer").value.replace(" ","")

if(user==answer || Math.abs(user-answer)<0.01){

correct()

}else{

wrong++
streak=0

document.getElementById("feedback").innerHTML="<span class='wrong'>Incorrect</span>"

if(wrong>=3){
document.getElementById("solution").innerHTML="<b>Solution:</b> "+solution
}

updateStats()

}

}

function correct(){

document.getElementById("feedback").innerHTML="<span class='correct'>Correct</span>"

score++
streak++
xp=parseInt(xp)+10

if(xp>=100){
level++
xp=0
}

updateStats()

}

function showHint(){
document.getElementById("hint").innerHTML="<b>Hint:</b> "+hint
}

function updateStats(){

localStorage.setItem("score",score)
localStorage.setItem("xp",xp)
localStorage.setItem("level",level)
localStorage.setItem("streak",streak)

document.getElementById("score").innerText=score
document.getElementById("xp").innerText=xp
document.getElementById("level").innerText=level
document.getElementById("streak").innerText=streak

}

/* DRAWING */

function drawCircle(r){

let ctx=document.getElementById("diagram").getContext("2d")

ctx.beginPath()
ctx.arc(250,160,r*10,0,2*Math.PI)
ctx.stroke()

}

function drawSector(r,a){

let ctx=document.getElementById("diagram").getContext("2d")

ctx.beginPath()
ctx.moveTo(250,160)
ctx.arc(250,160,r*10,0,a*Math.PI/180)
ctx.closePath()
ctx.stroke()

}

function drawTriangle(a,b){

let ctx=document.getElementById("diagram").getContext("2d")

ctx.beginPath()
ctx.moveTo(100,250)
ctx.lineTo(100+a*20,250)
ctx.lineTo(100+a*20,250-b*20)
ctx.closePath()
ctx.stroke()

}

function drawBars(v){

let ctx=document.getElementById("diagram").getContext("2d")

for(let i=0;i<v.length;i++){
ctx.fillRect(150+i*80,260-v[i]*15,50,v[i]*15)
}

}

function drawPie(){

let ctx=document.getElementById("diagram").getContext("2d")

ctx.beginPath()
ctx.moveTo(250,160)
ctx.arc(250,160,100,0,Math.PI/2)
ctx.closePath()
ctx.fill()

ctx.beginPath()
ctx.arc(250,160,100,0,2*Math.PI)
ctx.stroke()

}

function drawGrid(){

let ctx=document.getElementById("diagram").getContext("2d")

for(let i=0;i<500;i+=20){

ctx.moveTo(i,0)
ctx.lineTo(i,320)
ctx.stroke()

ctx.moveTo(0,i)
ctx.lineTo(500,i)
ctx.stroke()

}

}

function drawTree(){

let ctx=document.getElementById("diagram").getContext("2d")

ctx.moveTo(120,160)
ctx.lineTo(220,100)

ctx.moveTo(120,160)
ctx.lineTo(220,220)

ctx.stroke()

}

function gcd(a,b){
return b==0?a:gcd(b,a%b)
}

generateQuestion()

</script>

</body>

</html>
