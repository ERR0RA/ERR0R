<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Quiz</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
    max-width: 600px;
    margin: auto;
    background: #f0f0f0;
  }
  h1 { text-align: center; }
  button {
    padding: 10px 20px;
    margin: 5px 0;
    font-size: 16px;
    cursor: pointer;
  }
  .question-box {
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
    margin-bottom: 10px;
  }
  .answer-btn {
    display: block;
    width: 100%;
    margin: 5px 0;
  }
  #mode-select button { margin-right: 5px; }
  canvas {
    border: 1px solid #000;
    margin-top: 10px;
    background: #fff;
  }
</style>
</head>
<body>

<h1>Math Quiz</h1>

<div id="mode-select">
  <button onclick="setMode('easy')">Easy</button>
  <button onclick="setMode('medium')">Medium</button>
  <button onclick="setMode('hard')">Hard</button>
</div>

<div class="question-box" id="question-box">
  <p id="question-text">Select a mode to start!</p>
  <div id="answers"></div>
</div>

<button onclick="nextQuestion()">New Question</button>

<canvas id="mathCanvas" width="500" height="300"></canvas>

<script>
// Questions with variety and more questions
const questions = {
  easy: [
    { q: "2 + 3 =", a: ["4", "5", "6", "7"], correct: 1 },
    { q: "5 - 2 =", a: ["2", "3", "4", "1"], correct: 1 },
    { q: "1-step equation: x + 6 = 10, x = ?", a: ["2", "3", "4", "5"], correct: 2 },
    { q: "Simplify: 2 + 2 * 2 =", a: ["6", "8", "4", "10"], correct: 0 },
    { q: "Ratio: 3:4 = ? : 12", a: ["9", "8", "10", "7"], correct: 1 },
    { q: "Find the missing number: 7 + ? = 15", a: ["8", "7", "9", "6"], correct: 0 },
  ],
  medium: [
    { q: "12 ÷ 4 =", a: ["2", "3", "4", "6"], correct: 1 },
    { q: "15 + 7 =", a: ["20", "22", "23", "21"], correct: 1 },
    { q: "2-step equation: 3x + 4 = 16, x = ?", a: ["2", "3", "4", "5"], correct: 2 },
    { q: "Pythagoras: Right triangle sides a=6, b=8, c=?", a: ["10", "12", "14", "15"], correct: 0 },
    { q: "Simplify: 5 * (2 + 3) =", a: ["20", "25", "15", "10"], correct: 1 },
    { q: "Ratio problem: 5:2 = ? : 16", a: ["6", "12", "10", "16"], correct: 2 },
  ],
  hard: [
    { q: "Solve: 4x - 5 = 11", a: ["3", "4", "5", "6"], correct: 3 },
    { q: "Factor: x^2 - 16", a: ["(x+4)(x-4)", "(x-16)(x+1)", "x(x-16)", "x^2-4"], correct: 0 },
    { q: "Graph: y = x + 2", a: ["See canvas"], correct: 0, isGraph: true },
    { q: "Loci: Draw points 50px from center", a: ["See canvas"], correct: 0, isGraph: true },
    { q: "Pythagoras triangle: a=5, b=12, c=?", a: ["12", "13", "11", "14"], correct: 1 },
    { q: "Two-step equation: 2x + 7 = 15", a: ["3", "4", "5", "6"], correct: 0 },
  ]
};

let currentMode = null;
let currentQuestions = [];
let askedIndexes = [];

function setMode(mode) {
  currentMode = mode;
  currentQuestions = [...questions[mode]];
  askedIndexes = [];
  nextQuestion();
}

function nextQuestion() {
  const canvas = document.getElementById("mathCanvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!currentMode) {
    alert("Please select a mode first!");
    return;
  }

  if (askedIndexes.length >= currentQuestions.length) {
    alert("You've completed all questions in this mode! Restarting...");
    askedIndexes = [];
  }

  let index;
  do {
    index = Math.floor(Math.random() * currentQuestions.length);
  } while (askedIndexes.includes(index));

  askedIndexes.push(index);
  showQuestion(currentQuestions[index]);
}

function showQuestion(qObj) {
  const qText = document.getElementById("question-text");
  const answersDiv = document.getElementById("answers");
  qText.textContent = qObj.q;
  answersDiv.innerHTML = "";

  qObj.a.forEach((ans, i) => {
    const btn = document.createElement("button");
    btn.textContent = ans;
    btn.className = "answer-btn";
    btn.onclick = () => checkAnswer(i, qObj.correct);
    answersDiv.appendChild(btn);
  });

  if (qObj.isGraph) drawOnCanvas(qObj.q);
}

function checkAnswer(selected, correct) {
  if (selected === correct) {
    alert("✅ Correct!");
  } else {
    alert("❌ Wrong! Try again or press New Question.");
  }
}

function drawOnCanvas(question) {
  const canvas = document.getElementById("mathCanvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (question.includes("Graph")) {
    // Draw simple y=x+2 line
    ctx.beginPath();
    ctx.moveTo(0, canvas.height - 2); 
    ctx.lineTo(canvas.width, canvas.height - (canvas.width/50 +2));
    ctx.strokeStyle = "blue";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.font = "14px Arial";
    ctx.fillText("Graph y = x + 2", 10, 20);
  } else if (question.includes("Loci")) {
    // Draw circle with radius 50
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, 50, 0, Math.PI*2);
    ctx.strokeStyle = "green";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.font = "14px Arial";
    ctx.fillText("Locus: 50px from center", 10, 20);
  } else if (question.includes("Pythagoras")) {
    // Draw right triangle 5-12-13
    ctx.beginPath();
    ctx.moveTo(50, 250);
    ctx.lineTo(50, 250-5*10);
    ctx.lineTo(50+12*10, 250);
    ctx.closePath();
    ctx.strokeStyle = "red";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillText("Right triangle: 5-12-13", 10, 20);
  }
}
</script>

</body>
</html>
