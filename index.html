<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Revision</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
max-width:650px;
margin:auto;
padding:10px;
}

h1{
text-align:center;
}

.selector{
margin:10px 0;
}

.question{
font-size:20px;
margin:20px 0;
}

.formula{
color:#555;
font-style:italic;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
font-size:16px;
margin-top:5px;
}

button{
padding:10px;
font-size:16px;
margin:4px;
cursor:pointer;
}

.feedback{
margin-top:10px;
font-weight:bold;
}

canvas{
border:1px solid #888;
margin-top:10px;
}

.calculator{
display:none;
margin-top:15px;
background:#ddd;
padding:10px;
border-radius:10px;
}

.calc-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:5px;
}

.calc-grid button{
height:45px;
font-size:18px;
}

#hintBtn{
display:none;
background:#ffd700;
}

</style>

</head>

<body>

<h1>Maths Revision</h1>

<div class="selector">
Topic:
<select id="topic">
<option value="all">All</option>
</select>
</div>

<div class="selector">
Difficulty:
<select id="difficulty">
<option value="all">All</option>
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>
</div>

<button id="start">Start Quiz</button>

<div class="question" id="question"></div>
<div class="formula" id="formula"></div>

<canvas id="graphCanvas" width="400" height="300" style="display:none"></canvas>

<input id="answer" placeholder="Enter your answer">

<button id="submit">Submit</button> <button id="newQuestion">New Question</button> <button id="hintBtn">Show Hint</button>

<div class="feedback" id="feedback"></div>

<div class="calculator" id="calculator">

<h3>Calculator</h3>

<input id="calcDisplay" readonly>

<div class="calc-grid">

<button onclick="press('7')">7</button> <button onclick="press('8')">8</button> <button onclick="press('9')">9</button> <button onclick="press('/')">÷</button>

<button onclick="press('4')">4</button> <button onclick="press('5')">5</button> <button onclick="press('6')">6</button> <button onclick="press('*')">×</button>

<button onclick="press('1')">1</button> <button onclick="press('2')">2</button> <button onclick="press('3')">3</button> <button onclick="press('-')">−</button>

<button onclick="press('0')">0</button> <button onclick="press('.')">.</button> <button onclick="press('3.1416')">π</button> <button onclick="press('+')">+</button>

<button onclick="clearCalc()">C</button> <button onclick="calculate()">=</button>

</div>

</div>

<script>

const questions=[

{topic:"circle area",difficulty:"easy",text:"Find area of circle radius 5",answer:78.54},

{topic:"circle circumference",difficulty:"medium",text:"Circumference of circle radius 7",answer:43.98},

{topic:"volume cube",difficulty:"easy",text:"Volume of cube side 3",answer:27},

{topic:"ratio",difficulty:"easy",text:"Simplify ratio 10:15",answer:"2:3"},

{topic:"percentages",difficulty:"easy",text:"Find 25% of 200",answer:50},

{topic:"manipulating expressions",difficulty:"medium",text:"Simplify 3x + 5 - 2x + 7",answer:"x+12"},

{topic:"one step equations",difficulty:"easy",text:"Solve 2x + 5 = 11",answer:3},

{topic:"two step equations",difficulty:"medium",text:"Solve 3x - 7 = 8",answer:5},

{topic:"pythagoras",difficulty:"medium",text:"Right triangle sides 3 and 4. Find hypotenuse",answer:5},

{topic:"bounds",difficulty:"medium",text:"Bounds of 4.5 ± 0.1 (lower,upper)",answer:[4.4,4.6]},

{topic:"coordinates",difficulty:"easy",text:"Point (2,3) move 3 right and 2 up",answer:"(5,5)"},

{topic:"graphs",difficulty:"easy",text:"What shape is graph of y = x² ?",answer:"parabola"}

]

const formulas={

"circle area":"Area = πr²",

"circle circumference":"Circumference = 2πr",

"volume cube":"Volume = side³",

"ratio":"Divide both numbers by GCD",

"percentages":"(percent ÷ 100) × number",

"manipulating expressions":"Combine like terms",

"one step equations":"Use inverse operations",

"two step equations":"Undo +/− then ×/÷",

"pythagoras":"c² = a² + b²",

"bounds":"lower=value-error upper=value+error",

"coordinates":"Add movement to x and y",

"graphs":"y=x² makes a parabola"

}

let filtered=[]
let wrongCount=0

const topicSelect=document.getElementById("topic")

const topics=[...new Set(questions.map(q=>q.topic))]

topics.forEach(t=>{

let option=document.createElement("option")

option.value=t
option.textContent=t

topicSelect.appendChild(option)

})

document.getElementById("start").onclick=loadQuestion
document.getElementById("newQuestion").onclick=loadQuestion

function loadQuestion(){

let topic=topicSelect.value
let diff=document.getElementById("difficulty").value

filtered=questions.filter(q=>
(topic==="all"||q.topic===topic)&&
(diff==="all"||q.difficulty===diff)
)

if(filtered.length===0){

alert("No questions for this selection")
return

}

let q=filtered[Math.floor(Math.random()*filtered.length)]

current=q

document.getElementById("question").textContent=q.text
document.getElementById("formula").textContent=formulas[q.topic]||""
document.getElementById("answer").value=""
document.getElementById("feedback").textContent=""
document.getElementById("hintBtn").style.display="none"

drawGraph(q)

if(typeof q.answer==="number"){

document.getElementById("calculator").style.display="block"

}else{

document.getElementById("calculator").style.display="none"

}

}

let current=null

document.getElementById("submit").onclick=()=>{

let user=document.getElementById("answer").value.trim()

let correct=false

if(Array.isArray(current.answer)){

let parts=user.split(",").map(x=>parseFloat(x))

correct=
parts.length===2 &&
Math.abs(parts[0]-current.answer[0])<0.01 &&
Math.abs(parts[1]-current.answer[1])<0.01

}

else if(typeof current.answer==="number"){

let num=parseFloat(user)

correct=Math.abs(num-current.answer)<0.01

}

else{

correct=user.replace(/\s/g,"").toLowerCase()===current.answer.toLowerCase()

}

if(correct){

wrongCount=0

document.getElementById("feedback").textContent="✅ Correct"

}

else{

wrongCount++

document.getElementById("feedback").textContent="❌ Correct answer: "+current.answer

if(wrongCount>=2){

document.getElementById("hintBtn").style.display="inline-block"

}

}

}

document.getElementById("hintBtn").onclick=()=>{

alert("Hint: "+formulas[current.topic])

}

function drawGraph(q){

const canvas=document.getElementById("graphCanvas")

if(q.topic!=="graphs"){

canvas.style.display="none"
return

}

canvas.style.display="block"

const ctx=canvas.getContext("2d")

ctx.clearRect(0,0,400,300)

ctx.beginPath()
ctx.moveTo(0,150)
ctx.lineTo(400,150)
ctx.moveTo(200,0)
ctx.lineTo(200,300)
ctx.stroke()

ctx.beginPath()

for(let x=-10;x<=10;x+=0.1){

let y=x*x

let px=200+x*15
let py=150-y*5

if(x==-10){ctx.moveTo(px,py)}
else{ctx.lineTo(px,py)}

}

ctx.stroke()

}

function press(v){

document.getElementById("calcDisplay").value+=v

}

function clearCalc(){

document.getElementById("calcDisplay").value=""

}

function calculate(){

try{

let result=eval(document.getElementById("calcDisplay").value)

document.getElementById("calcDisplay").value=result.toFixed(2)

}catch{

document.getElementById("calcDisplay").value="Error"

}

}

</script>

</body>
</html>
