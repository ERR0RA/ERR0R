<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Quiz</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
    max-width: 600px;
    margin: auto;
    background: #f0f0f0;
  }
  h1 { text-align: center; }
  button {
    padding: 10px 20px;
    margin: 5px 0;
    font-size: 16px;
    cursor: pointer;
  }
  .question-box {
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
    margin-bottom: 10px;
  }
  .answer-btn {
    display: block;
    width: 100%;
    margin: 5px 0;
  }
  #mode-select button { margin-right: 5px; }
  canvas {
    border: 1px solid #000;
    margin-top: 10px;
    background: #fff;
  }
</style>
</head>
<body>

<h1>Math Quiz</h1>

<div id="mode-select">
  <button onclick="setMode('easy')">Easy</button>
  <button onclick="setMode('medium')">Medium</button>
  <button onclick="setMode('hard')">Hard</button>
</div>

<div class="question-box" id="question-box">
  <p id="question-text">Select a mode to start!</p>
  <div id="answers"></div>
</div>

<button onclick="nextQuestion()">New Question</button>

<!-- Canvas for graphs or Pythagoras -->
<canvas id="mathCanvas" width="500" height="300"></canvas>

<script>
// Questions with variety
const questions = {
  easy: [
    { q: "2 + 2 =", a: ["3", "4", "5", "6"], correct: 1 },
    { q: "5 - 3 =", a: ["1", "2", "3", "4"], correct: 1 },
    { q: "1-step equation: x + 5 = 8, x = ?", a: ["2", "3", "4", "5"], correct: 1 },
    { q: "Find the missing number in ratio 2:3 = ? : 9", a: ["6", "5", "7", "8"], correct: 0 }
  ],
  medium: [
    { q: "12 ÷ 4 =", a: ["2", "3", "4", "6"], correct: 1 },
    { q: "15 + 7 =", a: ["20", "22", "23", "21"], correct: 1 },
    { q: "2-step equation: 3x + 4 = 13, x = ?", a: ["2", "3", "4", "5"], correct: 1 },
    { q: "Pythagoras: Right triangle sides a=3, b=4, c=?", a: ["5", "6", "7", "8"], correct: 0 }
  ],
  hard: [
    { q: "Solve: 3x + 5 = 20", a: ["3", "4", "5", "6"], correct: 2 },
    { q: "Factor: x^2 - 9", a: ["(x+3)(x-3)", "(x-9)(x+1)", "x(x-9)", "x^2-3"], correct: 0 },
    { q: "Graph question: y = 2x + 1, plot points", a: ["See canvas"], correct: 0, isGraph: true },
    { q: "Loci: Draw all points 3 units from a fixed point", a: ["See canvas"], correct: 0, isGraph: true }
  ]
};

let currentMode = null;
let currentQuestions = [];
let askedIndexes = [];

function setMode(mode) {
  currentMode = mode;
  currentQuestions = [...questions[mode]];
  askedIndexes = [];
  nextQuestion();
}

function nextQuestion() {
  const canvas = document.getElementById("mathCanvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height); // clear canvas each question

  if (!currentMode) {
    alert("Please select a mode first!");
    return;
  }

  if (askedIndexes.length >= currentQuestions.length) {
    alert("You've completed all questions in this mode! Restarting...");
    askedIndexes = [];
  }

  let index;
  do {
    index = Math.floor(Math.random() * currentQuestions.length);
  } while (askedIndexes.includes(index));

  askedIndexes.push(index);
  showQuestion(currentQuestions[index]);
}

function showQuestion(qObj) {
  const qText = document.getElementById("question-text");
  const answersDiv = document.getElementById("answers");
  qText.textContent = qObj.q;
  answersDiv.innerHTML = "";

  qObj.a.forEach((ans, i) => {
    const btn = document.createElement("button");
    btn.textContent = ans;
    btn.className = "answer-btn";
    btn.onclick = () => checkAnswer(i, qObj.correct);
    answersDiv.appendChild(btn);
  });

  if (qObj.isGraph) drawOnCanvas(qObj.q);
}

function checkAnswer(selected, correct) {
  if (selected === correct) {
    alert("✅ Correct!");
  } else {
    alert("❌ Wrong! Try again or press New Question.");
  }
}

function drawOnCanvas(question) {
  const canvas = document.getElementById("mathCanvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (question.includes("Graph")) {
    // Draw simple y = 2x +1 line
    ctx.beginPath();
    ctx.moveTo(0, canvas.height - (1)); 
    ctx.lineTo(canvas.width, canvas.height - (2*canvas.width/50 +1));
    ctx.strokeStyle = "blue";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.font = "14px Arial";
    ctx.fillText("Graph y=2x+1", 10, 20);
  } else if (question.includes("Loci")) {
    // Draw circle with radius 50
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, 50, 0, Math.PI*2);
    ctx.strokeStyle = "green";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.font = "14px Arial";
    ctx.fillText("Locus: 3 units from point", 10, 20);
  } else if (question.includes("Pythagoras")) {
    // Draw right triangle 3-4-5
    ctx.beginPath();
    ctx.moveTo(50, 250);
    ctx.lineTo(50, 250-3*30);
    ctx.lineTo(50+4*30, 250);
    ctx.closePath();
    ctx.strokeStyle = "red";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillText("Right triangle: 3-4-5", 10, 20);
  }
}
</script>

</body>
</html>
