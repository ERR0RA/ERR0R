<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Revision</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 10px;
    background-color: #f4f4f4;
  }
  .container {
    max-width: 500px;
    width: 100%;
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
  }
  h1 {
    text-align: center;
  }
  select, input, button {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
    box-sizing: border-box;
    border-radius: 5px;
  }
  canvas {
    width: 100%;
    height: auto;
    border: 1px solid #ccc;
    margin: 10px 0;
  }
  #scoreBoard {
    text-align: center;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Maths Revision</h1>

  <select id="topicSelect">
    <option value="probTree">Probability Tree</option>
    <option value="linearSeq">Linear Sequence</option>
    <option value="nonLinearSeq">Non-linear Sequence</option>
    <option value="graphs">Graphs & Charts</option>
    <option value="circles">Circles & Areas</option>
  </select>

  <select id="difficultySelect">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
  </select>

  <button id="newQBtn">New Question</button>

  <canvas id="diagramCanvas"></canvas>

  <div id="questionText" style="text-align:center; margin:10px 0;"></div>

  <input type="text" id="answerInput" placeholder="Enter your answer">
  <button onclick="checkAnswer()">Submit</button>
  <button onclick="showHint()">Hint</button>

  <div id="scoreBoard">
    Score: <span id="score">0</span> | Level: <span id="level">1</span> | Streak: <span id="streak">0</span>
  </div>
</div>

<script>
// ========== GLOBAL VARIABLES ==========
let score = 0, level = 1, streak = 0;
let currentAnswer = 0;

// Canvas
const canvas = document.getElementById('diagramCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetWidth * 0.6;
    if(currentQuestion) drawDiagram(currentQuestion);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ========== QUESTIONS ==========
let currentQuestion = null;

function generateQuestion() {
    const topic = document.getElementById('topicSelect').value;
    const difficulty = document.getElementById('difficultySelect').value;

    if(topic === "probTree") {
        // Example: probability tree
        const p = difficulty === "easy" ? 0.4 : difficulty === "medium" ? 0.5 : 0.6;
        currentAnswer = +(p*p).toFixed(2); // two successes
        currentQuestion = {topic:"probTree", p};
        document.getElementById('questionText').innerText = `Success probability = ${p}. Two successes?`;
    }
    else if(topic === "linearSeq") {
        const start = Math.floor(Math.random()*10);
        const diff = Math.floor(Math.random()*5)+1;
        const n = 5;
        currentAnswer = start + (n-1)*diff;
        currentQuestion = {topic:"linearSeq", start, diff, n};
        document.getElementById('questionText').innerText = `Find the ${n}th term of sequence starting at ${start} with difference ${diff}.`;
    }
    else if(topic === "nonLinearSeq") {
        const start = 1;
        const n = 4;
        currentAnswer = start**n;
        currentQuestion = {topic:"nonLinearSeq", start, n};
        document.getElementById('questionText').innerText = `Find the ${n}th term of sequence n^2 (n=1,2,3...)`;
    }
    else if(topic === "graphs") {
        const a = Math.floor(Math.random()*5)+1;
        currentAnswer = a*2; // example
        currentQuestion = {topic:"graphs", a};
        document.getElementById('questionText').innerText = `y = ${a}x. Find y when x=2.`;
    }
    else if(topic === "circles") {
        const r = Math.floor(Math.random()*10)+1;
        currentAnswer = +(Math.PI*r*r).toFixed(2); // area
        currentQuestion = {topic:"circles", r};
        document.getElementById('questionText').innerText = `Find area of circle with radius ${r} (π≈3.1416).`;
    }

    drawDiagram(currentQuestion);
}

// ========== DRAW DIAGRAM ==========
function drawDiagram(q) {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(!q) return;
    if(q.topic==="probTree") {
        const w = canvas.width, h = canvas.height;
        ctx.beginPath();
        ctx.moveTo(w*0.3,h*0.2);
        ctx.lineTo(w*0.5,h*0.4);
        ctx.moveTo(w*0.3,h*0.2);
        ctx.lineTo(w*0.5,h*0.6);
        ctx.stroke();
    }
    else if(q.topic==="linearSeq") {
        ctx.font = "16px Arial";
        ctx.fillText("Linear sequence diagram", 10, 30);
    }
    else if(q.topic==="nonLinearSeq") {
        ctx.font = "16px Arial";
        ctx.fillText("Non-linear sequence diagram", 10, 30);
    }
    else if(q.topic==="graphs") {
        ctx.beginPath();
        ctx.moveTo(20,canvas.height-20);
        ctx.lineTo(canvas.width-20,canvas.height-20);
        ctx.moveTo(20,canvas.height-20);
        ctx.lineTo(20,20);
        ctx.stroke();
        ctx.font = "14px Arial";
        ctx.fillText("Graph example", 30, 30);
    }
    else if(q.topic==="circles") {
        ctx.beginPath();
        ctx.arc(canvas.width/2, canvas.height/2, 50, 0, Math.PI*2);
        ctx.stroke();
        ctx.fillText(`Radius = ${q.r}`, canvas.width/2 - 30, canvas.height/2 - 60);
    }
}

// ========== CHECK ANSWER ==========
function checkAnswer() {
    const user = parseFloat(document.getElementById('answerInput').value);
    if(Math.abs(user-currentAnswer)<0.01) {
        alert("Correct!");
        score += 10;
        streak += 1;
    } else {
        alert(`Wrong! Correct answer: ${currentAnswer}`);
        streak = 0;
    }
    document.getElementById('score').innerText = score;
    document.getElementById('streak').innerText = streak;
    document.getElementById('level').innerText = 1 + Math.floor(score/50);
    document.getElementById('answerInput').value = '';
    generateQuestion();
}

// ========== HINT ==========
function showHint() {
    if(currentQuestion.topic==="probTree") {
        alert("Hint: multiply probabilities along the branches.");
    } else if(currentQuestion.topic==="linearSeq") {
        alert("Hint: nth term = first term + (n-1)×difference.");
    } else if(currentQuestion.topic==="nonLinearSeq") {
        alert("Hint: nth term = n squared.");
    } else if(currentQuestion.topic==="graphs") {
        alert("Hint: plug x value into y = ax.");
    } else if(currentQuestion.topic==="circles") {
        alert("Hint: Area = πr²");
    }
}

// ========== INITIALIZE ==========
document.getElementById('newQBtn').addEventListener('click', generateQuestion);
generateQuestion();

</script>

</body>
</html>
