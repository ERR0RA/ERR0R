<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Wars: 3D Strike</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --p1-color: #00f2ff; --p2-color: #ff007b; }
        body {
            margin: 0; background: #050505; color: white;
            font-family: 'Rajdhani', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 3D Battle Stage */
        .stage {
            width: 100vw; height: 40vh;
            perspective: 1000px;
            display: flex; justify-content: center; align-items: flex-end;
            background: linear-gradient(to bottom, #111 0%, #222 100%);
            border-bottom: 4px solid #444;
            position: relative;
        }

        .floor {
            position: absolute; bottom: 0; width: 200%; height: 100px;
            background: repeating-linear-gradient(90deg, #111, #111 48px, #333 50px);
            transform: rotateX(70deg); z-index: 1;
        }

        /* 3D Characters */
        .char {
            width: 80px; height: 80px; position: absolute; bottom: 40px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10; display: flex; align-items: center; justify-content: center;
            font-size: 40px; border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        #p1-char { left: 20%; background: var(--p1-color); border: 4px solid white; box-shadow: 0 0 20px var(--p1-color); }
        #p2-char { right: 20%; background: var(--p2-color); border: 4px solid white; box-shadow: 0 0 20px var(--p2-color); }

        /* UI Elements */
        .ui-overlay {
            width: 90%; max-width: 800px; padding: 20px;
            background: rgba(20, 20, 20, 0.9); border-radius: 0 0 20px 20px;
            border: 1px solid #333; z-index: 20;
        }

        .hp-bar { height: 15px; background: #000; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; transition: 0.3s; }

        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
        .wpn-select, .skin-select {
            background: #222; color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; width: 100%;
        }

        /* Math/Combat Box */
        .combat-box {
            text-align: center; margin-top: 20px; padding: 20px;
            background: white; color: #111; border-radius: 15px;
        }
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .ans-btn {
            padding: 15px; font-size: 1.2em; cursor: pointer; border: 2px solid #ddd;
            background: #f9f9f9; border-radius: 8px; font-family: 'Syncopate', sans-serif;
        }

        /* Animations */
        @keyframes p1Strike { 0% { left: 20%; } 50% { left: 70%; transform: scale(1.2); } 100% { left: 20%; } }
        @keyframes p2Strike { 0% { right: 20%; } 50% { right: 70%; transform: scale(1.2); } 100% { right: 20%; } }
        .p1-atk { animation: p1Strike 0.5s ease-in-out; }
        .p2-atk { animation: p2Strike 0.5s ease-in-out; }
        
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(2px); } 50% { transform: translate(-2px); } 100% { transform: translate(2px); } }
    </style>
</head>
<body>

    <div class="stage">
        <div class="floor"></div>
        <div id="p1-char" class="char">👤</div>
        <div id="p2-char" class="char">🤖</div>
    </div>

    <div class="ui-overlay">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button onclick="toggleMode()" id="mode-btn" style="background: #444; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer;">Mode: vs Bot</button>
            <select id="bot-diff" style="background:#333; color:white; border:none; font-size: 12px;">
                <option value="2500|0.4">Noob Bot</option>
                <option value="1200|0.1">Pro Bot</option>
                <option value="500|0.01">Hacker Bot</option>
            </select>
        </div>

        <div class="controls-grid">
            <div>
                <div class="hp-bar"><div id="p1-hp" class="hp-fill" style="background: var(--p1-color);"></div></div>
                <select id="p1-wpn" class="wpn-select">
                    <option value="10|⚔️">Void Blade (10)</option>
                    <option value="20|🔥">Solar Flare (20)</option>
                    <option value="35|⚛️">Anti-Matter (35)</option>
                </select>
                <select onchange="changeSkin(1, this.value)" class="skin-select">
                    <option value="#00f2ff">Cyan Neon</option>
                    <option value="#ffaa00">Gold Armor</option>
                    <option value="#7000ff">Plasma</option>
                </select>
            </div>
            <div>
                <div class="hp-bar"><div id="p2-hp" class="hp-fill" style="background: var(--p2-color);"></div></div>
                <select id="p2-wpn" class="wpn-select">
                    <option value="10|🏹">Dark Bow (10)</option>
                    <option value="20|⚡">Thunder (20)</option>
                    <option value="35|☄️">Meteor (35)</option>
                </select>
                <select onchange="changeSkin(2, this.value)" class="skin-select">
                    <option value="#ff007b">Pink Neon</option>
                    <option value="#00ff44">Acid Green</option>
                    <option value="#ffffff">White Knight</option>
                </select>
            </div>
        </div>

        <div class="combat-box">
            <h2 id="turn-txt" style="margin:0; font-size: 14px; text-transform: uppercase;">Player 1 Turn</h2>
            <h1 id="question" style="margin: 10px 0; font-size: 40px;">-- x --</h1>
            <div class="ans-grid" id="ans-grid"></div>
        </div>
    </div>

<script>
    let state = {
        mode: 'bot', turn: 1, p1HP: 100, p2HP: 100, ans: 0, active: true
    };

    function toggleMode() {
        state.mode = state.mode === 'bot' ? 'pvp' : 'bot';
        document.getElementById('mode-btn').textContent = `Mode: ${state.mode === 'bot' ? 'vs Bot' : 'Local PvP'}`;
        document.getElementById('p2-char').textContent = state.mode === 'bot' ? '🤖' : '👤';
        reset();
    }

    function changeSkin(p, color) {
        document.getElementById(`p${p}-char`).style.backgroundColor = color;
        document.getElementById(`p${p}-char`).style.boxShadow = `0 0 20px ${color}`;
        document.getElementById(`p${p}-hp`).style.backgroundColor = color;
    }

    function reset() {
        state.p1HP = 100; state.p2HP = 100; state.turn = 1; state.active = true;
        updateUI();
        nextQ();
    }

    function updateUI() {
        document.getElementById('p1-hp').style.width = state.p1HP + '%';
        document.getElementById('p2-hp').style.width = state.p2HP + '%';
        document.getElementById('turn-txt').textContent = state.turn === 1 ? "Player 1 Strike" : (state.mode === 'bot' ? "Bot's Turn" : "Player 2 Strike");
    }

    function nextQ() {
        if(!state.active) return;
        const n1 = Math.floor(Math.random() * 10) + 2;
        const n2 = Math.floor(Math.random() * 10) + 2;
        state.ans = n1 * n2;
        document.getElementById('question').textContent = `${n1} × ${n2}`;

        let opts = [state.ans];
        while(opts.length < 4) {
            let f = state.ans + (Math.floor(Math.random() * 10) - 5);
            if(!opts.includes(f) && f > 0) opts.push(f);
        }
        opts.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('ans-grid');
        grid.innerHTML = '';
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'ans-btn';
            b.textContent = o;
            b.onclick = () => { if(state.turn === 1 || state.mode === 'pvp') check(o); };
            grid.appendChild(b);
        });

        if(state.mode === 'bot' && state.turn === 2) {
            const [delay, miss] = document.getElementById('bot-diff').value.split('|').map(Number);
            setTimeout(() => {
                if(Math.random() > miss) strike();
                else switchTurn();
            }, delay);
        }
    }

    function check(val) {
        if(val == state.ans) strike();
        else switchTurn();
    }

    function strike() {
        const char = document.getElementById(`p${state.turn}-char`);
        const target = document.getElementById(`p${state.turn === 1 ? 2 : 1}-char`);
        const wpn = document.getElementById(`p${state.turn}-wpn`).value.split('|');
        const dmg = parseInt(wpn[0]);

        char.classList.add(state.turn === 1 ? 'p1-atk' : 'p2-atk');
        setTimeout(() => {
            char.classList.remove('p1-atk', 'p2-atk');
            target.classList.add('shake');
            if(state.turn === 1) state.p2HP -= dmg; else state.p1HP -= dmg;
            updateUI();
            setTimeout(() => target.classList.remove('shake'), 200);
            
            if(state.p1HP <= 0 || state.p2HP <= 0) {
                state.active = false;
                document.getElementById('question').textContent = state.p1HP > 0 ? "P1 WINS!" : "P2 WINS!";
                document.getElementById('ans-grid').innerHTML = '<button onclick="reset()" class="ans-btn" style="width:100%">REMATCH</button>';
            } else {
                switchTurn();
            }
        }, 250);
    }

    function switchTurn() {
        state.turn = state.turn === 1 ? 2 : 1;
        updateUI();
        nextQ();
    }

    nextQ();
</script>
</body>
</html>
