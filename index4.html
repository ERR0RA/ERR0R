<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fighter: Bot Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
<style>
body { margin:0; overflow:hidden; background:#050505; font-family:'Orbitron'; }
#lobby { position:absolute; inset:0; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; }
.setup-grid { display:flex; gap:15px; }
.player-setup { background:#eee; padding:15px; border-radius:10px; width:300px; }
select,button { width:100%; padding:8px; margin:5px 0; }
#ui { position:absolute; top:10px; width:100%; display:flex; justify-content:space-between; padding:0 20px; visibility:hidden; }
.bar { width:300px; background:#111; }
.fill { height:15px; background:red; width:100%; }
</style>
</head>
<body>

<div id="lobby">
<h1>BOT MODE FIGHTER</h1>
<div class="setup-grid">
<div class="player-setup">
<h3>PLAYER 1</h3>
<select id="p1-color"><option value="0x0077ff">Blue</option></select>
<select id="p1-wep"><option value="muramasa">Muramasa</option><option value="dragon">Dragon</option></select>
</div>
<div class="player-setup">
<h3>PLAYER 2</h3>
<select id="p2-mode">
<option value="human">Human</option>
<option value="easy">Easy Bot</option>
<option value="medium">Medium Bot</option>
<option value="hard">Hard Bot</option>
</select>
<select id="p2-wep"><option value="muramasa">Muramasa</option><option value="dragon">Dragon</option></select>
</div>
</div>
<button id="start">START</button>
</div>

<div id="ui">
<div class="bar"><div id="hp1" class="fill"></div></div>
<div class="bar"><div id="hp2" class="fill"></div></div>
</div>

<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
<script type="module">
import * as THREE from 'three';

const SWORDS = {
 muramasa:{dmg:10,speed:0.2,range:2},
 dragon:{dmg:30,speed:0.08,range:3}
};

const BOTS = {
 easy:{speed:0.05,attack:0.01},
 medium:{speed:0.1,attack:0.03},
 hard:{speed:0.15,attack:0.06}
};

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

class Fighter{
 constructor(x){
  this.mesh=new THREE.Mesh(new THREE.BoxGeometry(1,2,1),new THREE.MeshBasicMaterial({color:0xffffff}));
  this.mesh.position.x=x;
  scene.add(this.mesh);
  this.hp=100;
  this.vel=0;
  this.atk=0;
 }
 update(keys,l,r,atk){
  if(keys[l]) this.mesh.position.x-=0.1;
  if(keys[r]) this.mesh.position.x+=0.1;
  if(keys[atk] && this.atk<=0) this.atk=1;
  if(this.atk>0) this.atk-=0.1;
 }
}

function botControl(bot,target,level){
 let s=BOTS[level];
 if(target.mesh.position.x>bot.mesh.position.x) bot.mesh.position.x+=s.speed;
 else bot.mesh.position.x-=s.speed;

 if(Math.random()<s.attack && bot.atk<=0) bot.atk=1;

 if(bot.atk>0) bot.atk-=0.1;
}

const p1=new Fighter(-5);
const p2=new Fighter(5);
const keys={};
onkeydown=e=>keys[e.code]=true;
onkeyup=e=>keys[e.code]=false;

let mode="human";

document.getElementById("start").onclick=()=>{
 mode=document.getElementById("p2-mode").value;
 document.getElementById("lobby").style.display="none";
 document.getElementById("ui").style.visibility="visible";
 animate();
};

function animate(){
 requestAnimationFrame(animate);

 p1.update(keys,'KeyA','KeyD','KeyF');

 if(mode==="human"){
  p2.update(keys,'ArrowLeft','ArrowRight','Slash');
 }else{
  botControl(p2,p1,mode);
 }

 if(Math.abs(p1.mesh.position.x-p2.mesh.position.x)<2){
  if(p1.atk>0) p2.hp-=1;
  if(p2.atk>0) p1.hp-=1;
 }

 document.getElementById("hp1").style.width=p1.hp+"%";
 document.getElementById("hp2").style.width=p2.hp+"%";

 camera.position.z=10;
 renderer.render(scene,camera);
}
</script>
</body>
</html>
