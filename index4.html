<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Hyper-Fighter</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 0; width: 100%; padding: 20px;
            display: flex; justify-content: space-between; box-sizing: border-box;
            pointer-events: none; z-index: 10;
        }
        .player-info { width: 300px; }
        .bar-bg { width: 100%; height: 20px; background: rgba(0,0,0,0.5); border: 2px solid #444; margin-top: 5px; }
        .bar-fill { height: 100%; transition: width 0.2s ease-out; }
        #hp1 { background: linear-gradient(90deg, #00f2ff, #0066ff); box-shadow: 0 0 15px #00f2ff; }
        #hp2 { background: linear-gradient(90deg, #ff004c, #ff6600); box-shadow: 0 0 15px #ff004c; }
        .controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: #aaa; font-size: 12px; text-align: center;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="player-info">
        <div style="color: #00f2ff; font-weight: bold;">PLAYER 1 (A/D/W + F)</div>
        <div class="bar-bg"><div id="hp1" class="bar-fill" style="width: 100%;"></div></div>
    </div>
    <div class="player-info" style="text-align: right;">
        <div style="color: #ff004c; font-weight: bold;">PLAYER 2 (ARROWS + K)</div>
        <div class="bar-bg"><div id="hp2" class="bar-fill" style="width: 100%;"></div></div>
    </div>
</div>

<div class="controls">
    WASD to Move/Jump • F to Strike | Arrows to Move/Jump • K to Strike
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205);
    scene.fog = new THREE.Fog(0x020205, 10, 50);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // --- LIGHTING ---
    const ambient = new THREE.AmbientLight(0xffffff, 0.1);
    scene.add(ambient);

    const blueLight = new THREE.PointLight(0x00f2ff, 100, 20);
    blueLight.position.set(-10, 5, 5);
    scene.add(blueLight);

    const redLight = new THREE.PointLight(0xff004c, 100, 20);
    redLight.position.set(10, 5, 5);
    scene.add(redLight);

    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(5, 20, 10);
    sun.castShadow = true;
    scene.add(sun);

    // --- ARENA ---
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ 
        color: 0x111111, 
        roughness: 0.1, 
        metalness: 0.5 
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Grid Helper for "Realistic" Tech feel
    const grid = new THREE.GridHelper(100, 50, 0x444444, 0x222222);
    scene.add(grid);

    // --- FIGHTER CLASS ---
    class Fighter {
        constructor(color, startX, id) {
            this.id = id;
            this.hp = 100;
            this.velocity = new THREE.Vector3();
            this.onGround = true;
            
            // Group to hold body parts
            this.mesh = new THREE.Group();
            
            // Body
            const bodyGeo = new THREE.CapsuleGeometry(0.5, 1.5, 4, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.8, roughness: 0.2 });
            this.body = new THREE.Mesh(bodyGeo, bodyMat);
            this.body.position.y = 1.25;
            this.body.castShadow = true;
            this.mesh.add(this.body);

            // Glowing Eyes
            const eyeGeo = new THREE.BoxGeometry(0.6, 0.1, 0.1);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const eyes = new THREE.Mesh(eyeGeo, eyeMat);
            eyes.position.set(0, 1.8, 0.4);
            this.mesh.add(eyes);

            this.mesh.position.x = startX;
            scene.add(this.mesh);

            this.isAttacking = false;
            this.attackCooldown = false;
        }

        update(keys, leftKey, rightKey, jumpKey, attackKey) {
            const speed = 0.15;
            const jumpForce = 0.25;
            const gravity = 0.01;

            if (keys[leftKey]) this.velocity.x = -speed;
            else if (keys[rightKey]) this.velocity.x = speed;
            else this.velocity.x *= 0.8;

            if (keys[jumpKey] && this.onGround) {
                this.velocity.y = jumpForce;
                this.onGround = false;
            }

            // Attack logic
            if (keys[attackKey] && !this.attackCooldown) {
                this.performAttack();
            }

            // Apply Physics
            this.velocity.y -= gravity;
            this.mesh.position.add(this.velocity);

            if (this.mesh.position.y <= 0) {
                this.mesh.position.y = 0;
                this.velocity.y = 0;
                this.onGround = true;
            }

            // Tilt toward movement
            this.mesh.rotation.z = -this.velocity.x * 0.5;
            this.mesh.rotation.y = this.velocity.x > 0 ? Math.PI/2 : -Math.PI/2;
        }

        performAttack() {
            this.isAttacking = true;
            this.attackCooldown = true;
            
            // Visual feedback: simple lunge
            this.body.scale.set(1.5, 1, 1.5);
            
            setTimeout(() => {
                this.body.scale.set(1, 1, 1);
                this.isAttacking = false;
            }, 200);

            setTimeout(() => { this.attackCooldown = false; }, 500);
        }
    }

    const p1 = new Fighter(0x00f2ff, -5, 1);
    const p2 = new Fighter(0xff004c, 5, 2);

    // --- INPUT ---
    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    // --- GAME LOOP ---
    function animate() {
        requestAnimationFrame(animate);

        p1.update(keys, 'KeyA', 'KeyD', 'KeyW', 'KeyF');
        p2.update(keys, 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'KeyK');

        // Collision Check
        const dist = p1.mesh.position.distanceTo(p2.mesh.position);
        if (dist < 1.5) {
            if (p1.isAttacking) {
                p2.hp -= 0.5;
                p2.velocity.x = 0.2;
            }
            if (p2.isAttacking) {
                p1.hp -= 0.5;
                p1.velocity.x = -0.2;
            }
        }

        // Update UI
        document.getElementById('hp1').style.width = p1.hp + '%';
        document.getElementById('hp2').style.width = p2.hp + '%';

        // Dynamic Camera: Centers between players and zooms
        const midPoint = new THREE.Vector3().addVectors(p1.mesh.position, p2.mesh.position).multiplyScalar(0.5);
        camera.position.x += (midPoint.x - camera.position.x) * 0.05;
        camera.position.y = 5;
        camera.position.z = 15 + Math.abs(p1.mesh.position.x - p2.mesh.position.x) * 0.5;
        camera.lookAt(midPoint.x, 2, 0);

        renderer.render(scene, camera);
    }

    animate();

    // Handle Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
