<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fighter: Master Armory Bot Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; user-select: none; }
        #lobby { position: absolute; inset: 0; background: radial-gradient(circle, #1a1a1a, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; color: white; }
        .setup-grid { display: flex; gap: 20px; margin-bottom: 20px; }
        .player-setup { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; width: 300px; border: 1px solid #444; text-align: center; }
        select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; font-family: 'Orbitron'; cursor: pointer; border: none; background: #333; color: white; }
        #start-btn { background: #e63946; color: #fff; font-size: 1.5rem; font-weight: 900; margin-top: 20px; }
        .mode-toggle { background: #444; margin-bottom: 20px; padding: 10px; border-radius: 10px; }
        
        #ui { position: absolute; top: 20px; width: 100%; padding: 0 50px; display: flex; justify-content: space-between; box-sizing: border-box; z-index: 10; visibility: hidden; pointer-events: none; }
        .bar-container { width: 350px; }
        .bar-bg { width: 100%; height: 20px; background: #111; border: 1px solid #555; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; background: #e63946; transition: width 0.2s; }
        #ko-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 120px; font-weight: 900; color: #fff; z-index: 150; pointer-events: none; transition: 0.3s; }
    </style>
</head>
<body>

<div id="lobby">
    <h1>MASTER ARMORY</h1>
    <div class="mode-toggle">
        <label>GAME MODE: </label>
        <select id="game-mode" style="width: 150px; display: inline-block;">
            <option value="pvp">Local PvP</option>
            <option value="bot">vs Bot (AI)</option>
        </select>
    </div>
    <div class="setup-grid">
        <div class="player-setup">
            <h3 style="color:#00f2ff">PLAYER 1</h3>
            <select id="p1-color"><option value="0x00f2ff">Cyan</option><option value="0xffd700">Gold</option></select>
            <select id="p1-wep">
                <option value="muramasa">Muramasa (Fast)</option>
                <option value="dragon">Dragon Slayer (Heavy)</option>
                <option value="estoc">Estoc (Long)</option>
            </select>
        </div>
        <div class="player-setup" id="p2-setup">
            <h3 style="color:#ff0055">PLAYER 2</h3>
            <select id="p2-color"><option value="0xff0055">Ruby</option><option value="0x00ff44">Acid</option></select>
            <select id="p2-wep"><option value="muramasa">Muramasa</option><option value="dragon">Dragon Slayer</option><option value="estoc">Estoc</option></select>
        </div>
    </div>
    <button id="start-btn">FIGHT</button>
</div>

<div id="ko-msg">K.O.</div>
<div id="ui">
    <div class="bar-container"><div class="bar-bg"><div id="hp1" class="hp-fill"></div></div></div>
    <div class="bar-container"><div class="bar-bg"><div id="hp2" class="hp-fill"></div></div></div>
</div>

<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

<script type="module">
    import * as THREE from 'three';

    const SWORDS = {
        muramasa: { dmg: 12, speed: 0.2, range: 2.2, scale: [0.06, 2.2, 0.06] },
        dragon:   { dmg: 35, speed: 0.07, range: 3.2, scale: [0.35, 3.2, 0.15] },
        estoc:    { dmg: 18, speed: 0.15, range: 3.8, scale: [0.04, 3.8, 0.04] }
    };

    let roundActive = false;
    let isBotMode = false;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const sun = new THREE.DirectionalLight(0xffffff, 1); sun.position.set(5, 10, 7); scene.add(sun);
    const grid = new THREE.GridHelper(100, 40, 0x444444, 0x111111); scene.add(grid);

    class Fighter {
        constructor(x, id) {
            this.id = id; this.hp = 100; this.atkPhase = 0; this.hitMark = false;
            this.group = new THREE.Group(); this.group.position.x = x;
            this.vel = new THREE.Vector3();
            scene.add(this.group);
        }
        init(color, wepKey) {
            this.group.clear(); this.hp = 100; this.wep = SWORDS[wepKey];
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.2), new THREE.MeshStandardMaterial({color: parseInt(color)}));
            body.position.y = 1.1; this.group.add(body);
            
            this.pivot = new THREE.Group(); this.pivot.position.set(0.6, 1.3, 0);
            const blade = new THREE.Mesh(new THREE.BoxGeometry(...this.wep.scale), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.8}));
            blade.position.y = this.wep.scale[1]/2; this.pivot.add(blade);
            this.group.add(this.pivot);
        }
        update() {
            if (this.atkPhase > 0) {
                this.atkPhase -= this.wep.speed;
                this.pivot.rotation.z = Math.sin(this.atkPhase * Math.PI) * 2;
            } else { this.pivot.rotation.z = 0; }
            this.group.position.x += this.vel.x;
            this.vel.x *= 0.8;
            this.group.position.x = Math.max(-15, Math.min(15, this.group.position.x));
        }
    }

    const p1 = new Fighter(-6, 1);
    const p2 = new Fighter(6, 2);
    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    document.getElementById('start-btn').onclick = () => {
        isBotMode = document.getElementById('game-mode').value === 'bot';
        p1.init(document.getElementById('p1-color').value, document.getElementById('p1-wep').value);
        p2.init(document.getElementById('p2-color').value, document.getElementById('p2-wep').value);
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('ui').style.visibility = 'visible';
        roundActive = true;
        animate();
    };

    function runBotAI() {
        const dist = p2.group.position.x - p1.group.position.x;
        // Move toward player
        if (Math.abs(dist) > p2.wep.range * 0.8) {
            p2.vel.x = dist > 0 ? -0.1 : 0.1;
        }
        // Attack if in range
        if (Math.abs(dist) < p2.wep.range && p2.atkPhase <= 0) {
            p2.atkPhase = 1; p2.hitMark = false;
        }
    }

    function animate() {
        if (!roundActive) return;
        requestAnimationFrame(animate);

        // P1 Controls
        if (keys['KeyA']) p1.vel.x = -0.15;
        if (keys['KeyD']) p1.vel.x = 0.15;
        if (keys['KeyF'] && p1.atkPhase <= 0) { p1.atkPhase = 1; p1.hitMark = false; }

        // P2 Controls or AI
        if (isBotMode) {
            runBotAI();
        } else {
            if (keys['ArrowLeft']) p2.vel.x = -0.15;
            if (keys['ArrowRight']) p2.vel.x = 0.15;
            if (keys['KeyK'] && p2.atkPhase <= 0) { p2.atkPhase = 1; p2.hitMark = false; }
        }

        p1.update(); p2.update();

        // Collision/Damage
        const d = Math.abs(p1.group.position.x - p2.group.position.x);
        [p1, p2].forEach((attacker, i) => {
            const defender = i === 0 ? p2 : p1;
            if (attacker.atkPhase > 0.4 && attacker.atkPhase < 0.7 && !attacker.hitMark && d < attacker.wep.range) {
                defender.hp -= attacker.wep.dmg;
                attacker.hitMark = true;
                defender.vel.x = (attacker.group.position.x < defender.group.position.x ? 1 : -1) * 0.4;
            }
        });

        document.getElementById('hp1').style.width = Math.max(0, p1.hp) + '%';
        document.getElementById('hp2').style.width = Math.max(0, p2.hp) + '%';

        if (p1.hp <= 0 || p2.hp <= 0) {
            roundActive = false;
            document.getElementById('ko-msg').style.transform = 'translate(-50%, -50%) scale(1)';
            setTimeout(() => location.reload(), 3000);
        }

        camera.position.set((p1.group.position.x + p2.group.position.x)/2, 5, 15);
        camera.lookAt((p1.group.position.x + p2.group.position.x)/2, 2, 0);
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
