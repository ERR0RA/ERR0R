<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fighter: Master Armory</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Orbitron', sans-serif; user-select: none; }
        #lobby { position: absolute; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .setup-grid { display: flex; gap: 15px; }
        .player-setup { background: #f0f0f0; padding: 15px; border-radius: 12px; width: 320px; text-align: center; border: 2px solid #ddd; }
        select, button { width: 100%; padding: 10px; margin: 4px 0; border-radius: 5px; font-family: 'Orbitron'; cursor: pointer; font-size: 0.9rem; }
        #start-btn { background: #000; color: #fff; font-size: 1.3rem; margin-top: 15px; border: none; transition: 0.2s; }
        #start-btn:hover { background: #333; transform: scale(1.02); }
        
        #ui { position: absolute; top: 20px; width: 100%; padding: 0 40px; display: flex; justify-content: space-between; box-sizing: border-box; pointer-events: none; z-index: 10; visibility: hidden; }
        .bar-container { width: 360px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .bar-bg { width: 100%; height: 18px; background: #222; overflow: hidden; position: relative; }
        .hp-fill { height: 100%; width: 100%; background: #e63946; transition: width 0.3s; }
        .super-bg { width: 100%; height: 6px; background: #111; margin-top: 5px; }
        .super-fill { height: 100%; width: 0%; background: #00b4d8; transition: width 0.2s; }
        .labels { display: flex; justify-content: space-between; color: #fff; font-size: 10px; margin-bottom: 2px; text-transform: uppercase; }
        
        #ko-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 100px; font-weight: 900; color: #fff; transition: 0.4s; z-index: 150; text-shadow: 0 0 20px #ff0000; }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="letter-spacing: 5px;">MASTER ARMORY</h1>
    <div class="setup-grid">
        <div class="player-setup">
            <h3 style="color:#0077ff">PLAYER 1</h3>
            <select id="p1-color">
                <option value="0x0077ff">Cobalt</option><option value="0xffd700">Gold</option>
                <option value="0x7700ff">Amethyst</option><option value="0x00ff00">Neon</option>
                <option value="0xeeeeee">Silver</option><option value="0xff00ff">Rose</option>
            </select>
            <select id="p1-wep">
                <option value="muramasa">Muramasa (Ultra Fast)</option>
                <option value="dragon">Dragon Slayer (Massive)</option>
                <option value="estoc">Estoc (Long Reach)</option>
                <option value="gladius">Gladius (Quick Recov)</option>
                <option value="claymore">Claymore (Balanced Heavy)</option>
                <option value="kris">Kris (Super Charger)</option>
                <option value="star">Morning Star (Drains Heal)</option>
            </select>
        </div>
        <div class="player-setup">
            <h3 style="color:#ff3300">PLAYER 2</h3>
            <select id="p2-color">
                <option value="0xff3300">Crimson</option><option value="0x00ffff">Cyan</option>
                <option value="0x333333">Obsidian</option><option value="0xff8800">Amber</option>
                <option value="0xffffff">Ghost</option><option value="0x55ff00">Slime</option>
            </select>
            <select id="p2-wep">
                <option value="muramasa">Muramasa</option><option value="dragon">Dragon Slayer</option>
                <option value="estoc">Estoc</option><option value="gladius">Gladius</option>
                <option value="claymore">Claymore</option><option value="kris">Kris</option>
                <option value="star">Morning Star</option>
            </select>
        </div>
    </div>
    <button id="start-btn">DUEL</button>
</div>

<div id="ko-msg">K.O.</div>
<div id="ui">
    <div class="bar-container">
        <div class="labels"><span>Health</span><span id="p1-wep-name"></span></div>
        <div class="bar-bg"><div id="hp1" class="hp-fill"></div></div>
        <div class="super-bg"><div id="super1" class="super-fill"></div></div>
    </div>
    <div class="bar-container">
        <div class="labels"><span id="p2-wep-name"></span><span>Health</span></div>
        <div class="bar-bg"><div id="hp2" class="hp-fill"></div></div>
        <div class="super-bg"><div id="super2" class="super-fill"></div></div>
    </div>
</div>

<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

<script type="module">
    import * as THREE from 'three';

    const SWORDS = {
        muramasa: { dmg: 12, speed: 0.25, range: 2.1, scale: [0.04, 2, 0.04], superMult: 1 },
        dragon:   { dmg: 45, speed: 0.06, range: 3.5, scale: [0.3, 3.5, 0.15], superMult: 0.8 },
        estoc:    { dmg: 18, speed: 0.2,  range: 3.0, scale: [0.03, 3, 0.03], superMult: 1 },
        gladius:  { dmg: 20, speed: 0.35, range: 1.8, scale: [0.1, 1.6, 0.1], superMult: 1.2 },
        claymore: { dmg: 32, speed: 0.1,  range: 2.8, scale: [0.15, 2.8, 0.1], superMult: 1 },
        kris:     { dmg: 8,  speed: 0.4,  range: 1.4, scale: [0.05, 1.2, 0.05], superMult: 2.5 },
        star:     { dmg: 28, speed: 0.12, range: 2.2, scale: [0.25, 1.8, 0.25], superMult: 1 }
    };

    let roundActive = true;
    const projectiles = [];
    const scene = new THREE.Scene(); scene.background = new THREE.Color(0x0a0a0a);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight); renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const sun = new THREE.DirectionalLight(0xffffff, 1.5); sun.position.set(5, 15, 10); sun.castShadow = true; scene.add(sun);
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x111111 }));
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

    class Fighter {
        constructor(x, id) {
            this.id = id; this.startX = x; this.hp = 100; this.pts = 0; this.dead = false; this.blocking = false;
            this.vel = new THREE.Vector3(); this.group = new THREE.Group();
            this.atkPhase = 0; this.hitMark = false; scene.add(this.group);
        }
        init(color, wepKey) {
            this.group.clear(); this.group.position.set(this.startX, 0, 0);
            this.hp = 100; this.pts = 0; this.dead = false; this.wepKey = wepKey; this.wep = SWORDS[wepKey];
            this.mat = new THREE.MeshStandardMaterial({ color: parseInt(color), metalness: 0.8, roughness: 0.2 });
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.5), this.mat);
            body.position.y = 1.25; body.castShadow = true; this.group.add(body);
            this.pivot = new THREE.Group(); this.pivot.position.set(0.6, 1.4, 0);
            const blade = new THREE.Mesh(new THREE.BoxGeometry(...this.wep.scale), new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 1 }));
            blade.position.y = this.wep.scale[1]/2; this.pivot.add(blade);
            this.group.add(this.pivot);
        }
        update(keys, l, r, j, f, g, h, b) {
            if(this.dead || !roundActive) return;
            this.blocking = keys[b];
            if(this.blocking) { this.mat.emissive.setHex(0x333333); this.vel.x = 0; } 
            else {
                this.mat.emissive.setHex(0x000000);
                if(keys[l]) { this.vel.x = -0.15; this.group.rotation.y = -Math.PI/2; }
                else if(keys[r]) { this.vel.x = 0.15; this.group.rotation.y = Math.PI/2; }
                else this.vel.x *= 0.85;
                if(keys[j] && this.group.position.y <= 0.05) this.vel.y = 0.25;
            }
            if(keys[f] && this.atkPhase <= 0 && !this.blocking) { this.atkPhase = 1; this.hitMark = false; }
            if(keys[g] && this.atkPhase <= 0 && !this.blocking) { 
                const s = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color:0x00ffff}));
                s.position.copy(this.group.position).add(new THREE.Vector3(0,1.5,0));
                s.userData = {v: new THREE.Vector3(this.group.rotation.y > 0 ? 0.8 : -0.8, 0, 0), owner: this.id};
                projectiles.push(s); scene.add(s); this.atkPhase = 0.4;
            }
            if(keys[h]) { if(this.pts >= 2 && this.hp < 100) { this.hp = Math.min(100, this.hp + 20); this.pts -= 2; } keys[h] = false; }
            if(this.atkPhase > 0) { this.atkPhase -= this.wep.speed; this.pivot.rotation.z = Math.sin(this.atkPhase * Math.PI) * 2.5; }
            this.vel.y -= 0.01; this.group.position.add(this.vel);
            if(this.group.position.y < 0) { this.group.position.y = 0; this.vel.y = 0; }
        }
    }

    const p1 = new Fighter(-7, 1); const p2 = new Fighter(7, 2);
    const keys = {}; window.onkeydown = (e) => keys[e.code] = true; window.onkeyup = (e) => keys[e.code] = false;

    document.getElementById('start-btn').onclick = () => {
        p1.init(document.getElementById('p1-color').value, document.getElementById('p1-wep').value);
        p2.init(document.getElementById('p2-color').value, document.getElementById('p2-wep').value);
        document.getElementById('p1-wep-name').innerText = p1.wepKey;
        document.getElementById('p2-wep-name').innerText = p2.wepKey;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('ui').style.visibility = 'visible';
        animate();
    };

    function animate() {
        requestAnimationFrame(animate);
        p1.update(keys, 'KeyA', 'KeyD', 'KeyW', 'KeyF', 'KeyG', 'KeyH', 'KeyS');
        p2.update(keys, 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'KeyK', 'KeyL', 'KeyP', 'ArrowDown');

        projectiles.forEach((p, i) => {
            p.position.add(p.userData.v);
            const target = p.userData.owner === 1 ? p2 : p1;
            if(p.position.distanceTo(target.group.position.clone().add(new THREE.Vector3(0,1,0))) < 1.2) {
                target.hp -= target.blocking ? 1 : 5; scene.remove(p); projectiles.splice(i, 1);
            } else if(Math.abs(p.position.x)>50) { scene.remove(p); projectiles.splice(i, 1); }
        });

        const d = p1.group.position.distanceTo(p2.group.position);
        const handleMelee = (atk, def, dir) => {
            if(atk.atkPhase > 0.4 && atk.atkPhase < 0.7 && !atk.hitMark && d < atk.wep.range) {
                let dmg = def.blocking ? Math.floor(atk.wep.dmg * 0.2) : atk.wep.dmg;
                def.hp -= dmg; atk.hitMark = true; atk.pts = Math.min(10, atk.pts + (1 * atk.wep.superMult));
                def.vel.x = dir * (def.blocking ? 0.05 : 0.3);
                if(atk.wepKey === 'star' && !def.blocking) def.pts = Math.max(0, def.pts - 1);
            }
        };
        handleMelee(p1, p2, 1); handleMelee(p2, p1, -1);

        if((p1.hp <= 0 || p2.hp <= 0) && roundActive) {
            roundActive = false; document.getElementById('ko-msg').style.transform = 'translate(-50%, -50%) scale(1)';
            setTimeout(() => { location.reload(); }, 2000);
        }

        document.getElementById('hp1').style.width = Math.max(0, p1.hp) + '%';
        document.getElementById('hp2').style.width = Math.max(0, p2.hp) + '%';
        document.getElementById('super1').style.width = (p1.pts * 10) + '%';
        document.getElementById('super2').style.width = (p2.pts * 10) + '%';
        camera.position.set((p1.group.position.x + p2.group.position.x)/2, 6, 18);
        camera.lookAt((p1.group.position.x + p2.group.position.x)/2, 2, 0);
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
