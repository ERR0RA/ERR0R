<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pro Fighter: Neon Sunrise</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Orbitron', sans-serif; user-select: none; }
        #ui {
            position: absolute; top: 0; width: 100%; padding: 30px;
            display: flex; justify-content: space-between; box-sizing: border-box;
            pointer-events: none; z-index: 10;
        }
        .player-card { 
            width: 350px; background: rgba(255, 255, 255, 0.1); 
            padding: 20px; border-radius: 15px; backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .bar-container { width: 100%; height: 20px; background: rgba(0,0,0,0.3); border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.15s ease-out; }
        #hp1 { background: linear-gradient(90deg, #00f2ff, #7000ff); box-shadow: 0 0 20px #00f2ff; }
        #hp2 { background: linear-gradient(90deg, #ff004c, #ffaa00); box-shadow: 0 0 20px #ff004c; }
        
        #ko-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            color: #fff; font-size: 120px; font-weight: 900; font-style: italic;
            text-shadow: 0 0 50px #ff004c; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="ko-text">FINISH!</div>

<div id="ui">
    <div class="player-card">
        <div style="color:#00f2ff; font-weight:bold; font-size:20px;">VORTEX</div>
        <div class="bar-container"><div id="hp1" class="bar-fill"></div></div>
        <div style="color: #ccc; font-size: 12px;">WASD + F</div>
    </div>
    <div class="player-card" style="text-align: right;">
        <div style="color:#ff004c; font-weight:bold; font-size:20px;">BLAZE</div>
        <div class="bar-container"><div id="hp2" class="bar-fill"></div></div>
        <div style="color: #ccc; font-size: 12px;">ARROWS + K</div>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // Light sky blue base
    scene.fog = new THREE.Fog(0x87ceeb, 20, 60);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- LIGHTING (Lighter/Warmer) ---
    const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(5, 20, 10);
    sun.castShadow = true;
    scene.add(sun);

    // --- BACKGROUND BUILDINGS ---
    function createBuilding(x, z, h, color) {
        const geo = new THREE.BoxGeometry(4, h, 4);
        const mat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.5, roughness: 0.2 });
        const b = new THREE.Mesh(geo, mat);
        b.position.set(x, h/2 - 1, z);
        scene.add(b);
    }
    for(let i=0; i<15; i++) {
        createBuilding(-20 - Math.random()*20, -10 - Math.random()*20, 10 + Math.random()*20, 0x222244);
        createBuilding(20 + Math.random()*20, -10 - Math.random()*20, 10 + Math.random()*20, 0x222244);
    }

    // --- FLOOR ---
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 100),
        new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.2, roughness: 0.8 })
    );
    floor.rotation.x = -Math.PI/2;
    floor.receiveShadow = true;
    scene.add(floor);

    // --- FIGHTER ---
    class Fighter {
        constructor(color, x, id, wepColor) {
            this.id = id;
            this.hp = 100;
            this.dead = false;
            this.vel = new THREE.Vector3();
            
            this.group = new THREE.Group();
            this.body = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.5, 1.5, 4, 12),
                new THREE.MeshStandardMaterial({ color: color, metalness: 0.6, roughness: 0.2 })
            );
            this.body.position.y = 1.25;
            this.body.castShadow = true;
            this.group.add(this.body);

            // Weapon (Sleek Sword)
            this.wepPivot = new THREE.Group();
            this.wepPivot.position.set(0.6, 1.4, 0);
            const sword = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 2, 0.1),
                new THREE.MeshStandardMaterial({ color: wepColor, emissive: wepColor, emissiveIntensity: 2 })
            );
            sword.position.y = 0.8;
            this.wepPivot.add(sword);
            this.group.add(this.wepPivot);

            this.group.position.x = x;
            scene.add(this.group);

            this.atk = 0;
            this.hitMark = false;
        }

        update(keys, l, r, j, f) {
            if(this.dead) {
                this.group.rotation.z += (Math.PI/2 - this.group.rotation.z) * 0.05;
                this.group.position.y *= 0.9;
                return;
            }

            if(keys[l]) { this.vel.x = -0.15; this.group.rotation.y = -Math.PI/2; }
            else if(keys[r]) { this.vel.x = 0.15; this.group.rotation.y = Math.PI/2; }
            else { this.vel.x *= 0.85; }

            if(keys[j] && this.group.position.y <= 0.01) this.vel.y = 0.25;

            if(keys[f] && this.atk <= 0) { this.atk = 1; this.hitMark = false; }
            if(this.atk > 0) {
                this.atk -= 0.1;
                this.wepPivot.rotation.z = Math.sin(this.atk * Math.PI) * 2.5;
            }

            this.vel.y -= 0.01;
            this.group.position.add(this.vel);
            if(this.group.position.y < 0) { this.group.position.y = 0; this.vel.y = 0; }
        }
    }

    const p1 = new Fighter(0x00f2ff, -5, 1, 0x00ffff);
    const p2 = new Fighter(0xff004c, 5, 2, 0xff0000);

    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    let timeScale = 1;

    function animate() {
        requestAnimationFrame(animate);

        const dt = 1 * timeScale;
        p1.update(keys, 'KeyA', 'KeyD', 'KeyW', 'KeyF');
        p2.update(keys, 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'KeyK');

        // Combat
        const dist = p1.group.position.distanceTo(p2.group.position);
        if(dist < 2.5) {
            if(p1.atk > 0.4 && p1.atk < 0.7 && !p1.hitMark) {
                p2.hp -= 15; p1.hitMark = true; p2.vel.x = 0.3;
                if(p2.hp <= 0) startDeath();
            }
            if(p2.atk > 0.4 && p2.atk < 0.7 && !p2.hitMark) {
                p1.hp -= 15; p2.hitMark = true; p1.vel.x = -0.3;
                if(p1.hp <= 0) startDeath();
            }
        }

        function startDeath() {
            timeScale = 0.2; // Slow Motion
            document.getElementById('ko-text').style.transform = 'translate(-50%, -50%) scale(1)';
            setTimeout(() => { timeScale = 1; }, 2000);
        }

        document.getElementById('hp1').style.width = Math.max(0, p1.hp) + '%';
        document.getElementById('hp2').style.width = Math.max(0, p2.hp) + '%';
        if(p1.hp <= 0) p1.dead = true;
        if(p2.hp <= 0) p2.dead = true;

        // Camera
        const midX = (p1.group.position.x + p2.group.position.x) / 2;
        camera.position.set(midX, 5, 15);
        camera.lookAt(midX, 2, 0);

        renderer.render(scene, camera);
    }

    animate();
</script>
</body>
</html>
