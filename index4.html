<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Wars: 3D Ultra</title>
<style>
    :root {
        --p1-color: #00f2ff;
        --p2-color: #ff007b;
        --bg-dark: #050505;
        --card-bg: rgba(255, 255, 255, 0.05);
    }

    body {
        font-family: 'Orbitron', sans-serif;
        background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        perspective: 1000px;
        min-height: 100vh;
        margin: 0;
        overflow-x: hidden;
    }

    /* 3D Realism Containers */
    .game-viewport {
        transform: rotateX(10deg);
        transform-style: preserve-3d;
        width: 100%;
        max-width: 800px;
        margin-top: 30px;
    }

    .glass-card {
        background: var(--card-bg);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        margin-bottom: 20px;
    }

    /* Arena & HP Bars */
    .arena {
        display: flex;
        justify-content: space-between;
        gap: 20px;
    }

    .player-unit {
        flex: 1;
        text-align: center;
        padding: 15px;
        border-radius: 15px;
        transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .player-unit.active {
        background: rgba(255, 255, 255, 0.1);
        transform: translateZ(30px);
        box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
    }

    .hp-track {
        height: 25px;
        background: #111;
        border-radius: 50px;
        overflow: hidden;
        border: 2px solid #333;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
    }

    .hp-fill {
        height: 100%;
        width: 100%;
        transition: width 0.5s ease;
        background: linear-gradient(90deg, #fff 0%, transparent 100%);
    }

    /* Skins & Customization */
    .skin-neon { color: var(--p1-color); text-shadow: 0 0 10px var(--p1-color); }
    .skin-obsidian { color: #555; text-shadow: 0 0 5px #000; }
    .skin-gold { color: #ffd700; text-shadow: 0 0 10px #ffaa00; }

    /* Controls */
    .control-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    button {
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background: #222;
        color: #eee;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
    }

    button.active { background: #00d2ff; color: #000; box-shadow: 0 0 15px #00d2ff; }

    /* Quiz Area */
    .quiz-area {
        background: white;
        color: #111;
        border-radius: 15px;
        padding: 30px;
        text-align: center;
        transform: translateZ(10px);
    }

    .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
    .ans-btn {
        padding: 20px;
        font-size: 1.2em;
        background: #f0f0f0;
        border: 3px solid transparent;
        border-radius: 10px;
    }
    .ans-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

    #fx-text {
        position: fixed;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 5em;
        pointer-events: none;
        z-index: 100;
        opacity: 0;
    }
</style>
</head>
<body>

<div class="game-viewport">
    <div class="glass-card">
        <div class="control-row">
            <button id="mode-pvp" class="active" onclick="setMode('pvp')">Local PvP</button>
            <button id="mode-bot" onclick="setMode('bot')">vs Bot</button>
            <select id="bot-diff" onchange="resetGame()" style="background:#222; color:white; border:none; padding:10px; border-radius:8px;">
                <option value="3000|0.4">Noob Bot</option>
                <option value="1500|0.15" selected>Pro Bot</option>
                <option value="600|0.02">God Bot</option>
            </select>
        </div>
    </div>

    <div class="glass-card arena">
        <div id="unit-1" class="player-unit active">
            <h3 class="skin-neon" id="p1-name">P1: Neon Knight</h3>
            <div class="hp-track"><div id="p1-hp" class="hp-fill" style="background-color:var(--p1-color)"></div></div>
            <select id="p1-wpn" class="wpn-sel">
                <option value="10|⚔️">Blade (10)</option>
                <option value="15|🔥">Fire (15)</option>
                <option value="25|⚛️">Nuke (25)</option>
                <option value="30|⚡">Tesla (30)</option>
            </select>
            <select onchange="applySkin(1, this.value)">
                <option value="skin-neon">Neon Skin</option>
                <option value="skin-gold">Gold Skin</option>
                <option value="skin-obsidian">Obsidian</option>
            </select>
        </div>

        <div id="unit-2" class="player-unit">
            <h3 class="skin-neon" id="p2-name">P2: Shadow</h3>
            <div class="hp-track"><div id="p2-hp" class="hp-fill" style="background-color:var(--p2-color)"></div></div>
            <select id="p2-wpn" class="wpn-sel">
                <option value="10|🏹">Bow (10)</option>
                <option value="20|❄️">Frost (20)</option>
                <option value="28|☄️">Meteor (28)</option>
                <option value="40|☣️">Biolite (40)</option>
            </select>
            <select onchange="applySkin(2, this.value)">
                <option value="skin-neon">Neon Skin</option>
                <option value="skin-gold">Gold Skin</option>
                <option value="skin-obsidian">Obsidian</option>
            </select>
        </div>
    </div>

    <div class="quiz-area">
        <h2 id="turn-label">Player 1 Strike!</h2>
        <h1 id="question-text" style="font-size: 3em; margin: 10px 0;">-- x --</h1>
        <div class="ans-grid" id="ans-grid"></div>
    </div>
</div>

<div id="fx-text">💥</div>

<script>
let state = {
    mode: 'pvp',
    turn: 1,
    p1HP: 100,
    p2HP: 100,
    ans: 0,
    active: true
};

function applySkin(p, skinClass) {
    const el = document.getElementById(`p${p}-name`);
    el.className = skinClass;
}

function setMode(m) {
    state.mode = m;
    document.getElementById('mode-pvp').className = m === 'pvp' ? 'active' : '';
    document.getElementById('mode-bot').className = m === 'bot' ? 'active' : '';
    document.getElementById('p2-name').textContent = m === 'bot' ? 'Master Bot' : 'P2: Shadow';
    resetGame();
}

function resetGame() {
    state.p1HP = 100; state.p2HP = 100; state.turn = 1; state.active = true;
    updateUI();
    generateQ();
}

function updateUI() {
    document.getElementById('p1-hp').style.width = state.p1HP + '%';
    document.getElementById('p2-hp').style.width = state.p2HP + '%';
    document.getElementById('unit-1').classList.toggle('active', state.turn === 1);
    document.getElementById('unit-2').classList.toggle('active', state.turn === 2);
    document.getElementById('turn-label').textContent = state.turn === 1 ? "Player 1's Turn" : "Enemy Turn!";
}

function generateQ() {
    if(!state.active) return;
    const n1 = Math.floor(Math.random() * 12) + 2;
    const n2 = Math.floor(Math.random() * 12) + 2;
    state.ans = n1 * n2;
    document.getElementById('question-text').textContent = `${n1} × ${n2}`;

    let opts = [state.ans];
    while(opts.length < 4) {
        let fake = state.ans + (Math.floor(Math.random() * 20) - 10);
        if(!opts.includes(fake) && fake > 0) opts.push(fake);
    }
    opts.sort(() => Math.random() - 0.5);

    const grid = document.getElementById('ans-grid');
    grid.innerHTML = '';
    opts.forEach(o => {
        const b = document.createElement('button');
        b.className = 'ans-btn';
        b.textContent = o;
        b.onclick = () => check(o);
        grid.appendChild(b);
    });

    if(state.mode === 'bot' && state.turn === 2) {
        const [delay, miss] = document.getElementById('bot-diff').value.split('|').map(Number);
        setTimeout(() => botChoice(miss), delay);
    }
}

function check(val) {
    if(state.turn === 2 && state.mode === 'bot') return;
    if(val == state.ans) attack();
    else switchTurn();
}

function botChoice(missChance) {
    if(Math.random() > missChance) attack();
    else switchTurn();
}

function attack() {
    const wpnData = document.getElementById(`p${state.turn}-wpn`).value.split('|');
    const dmg = parseInt(wpnData[0]);
    const icon = wpnData[1];

    if(state.turn === 1) state.p2HP -= dmg;
    else state.p1HP -= dmg;

    triggerFX(icon);
    
    if(state.p1HP <= 0 || state.p2HP <= 0) {
        state.active = false;
        document.getElementById('question-text').textContent = "GAME OVER";
        document.getElementById('ans-grid').innerHTML = '<button onclick="resetGame()" style="width:100%">RESTART ARENA</button>';
    } else {
        switchTurn();
    }
}

function switchTurn() {
    state.turn = state.turn === 1 ? 2 : 1;
    updateUI();
    generateQ();
}

function triggerFX(icon) {
    const fx = document.getElementById('fx-text');
    fx.textContent = icon;
    fx.style.opacity = '1';
    fx.style.transform = 'translate(-50%, -80%) scale(1.5)';
    setTimeout(() => {
        fx.style.opacity = '0';
        fx.style.transform = 'translate(-50%, -50%) scale(1)';
    }, 600);
}

updateUI();
generateQ();
</script>
</body>
</html>
