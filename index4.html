<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fighter: Tactical Expansion</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Orbitron', sans-serif; user-select: none; }
        #lobby { position: absolute; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .setup-grid { display: flex; gap: 20px; }
        .player-setup { background: #f4f4f4; padding: 20px; border-radius: 15px; width: 280px; text-align: center; border: 2px solid #ccc; }
        select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; font-family: 'Orbitron'; cursor: pointer; }
        #start-btn { background: #222; color: #fff; font-size: 1.2rem; margin-top: 20px; }
        
        #ui { position: absolute; top: 20px; width: 100%; padding: 0 50px; display: flex; justify-content: space-between; box-sizing: border-box; pointer-events: none; z-index: 10; visibility: hidden; }
        .bar-container { width: 320px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
        .bar-bg { width: 100%; height: 20px; background: #333; border: 1px solid #fff; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; background: #0f0; transition: width 0.2s; }
        .super-bg { width: 100%; height: 8px; background: #222; margin-top: 5px; border-radius: 4px; overflow: hidden; }
        .super-fill { height: 100%; width: 0%; background: #0cf; transition: width 0.3s; }
        .controls-hint { color: #fff; font-size: 10px; margin-top: 5px; opacity: 0.8; }
        #ko-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 80px; font-weight: 900; color: #fff; transition: 0.3s; z-index: 150; }
    </style>
</head>
<body>

<div id="lobby">
    <h1>TACTICAL DUEL 3D</h1>
    <div class="setup-grid">
        <div class="player-setup">
            <h3 style="color:#0077ff">P1</h3>
            <select id="p1-color"><option value="0x0077ff">Blue</option><option value="0x00ff88">Green</option><option value="0x7700ff">Purple</option></select>
            <select id="p1-wep"><option value="kat">Katana</option><option value="zwei">Zweihander</option><option value="rap">Rapier</option></select>
        </div>
        <div class="player-setup">
            <h3 style="color:#ff3300">P2</h3>
            <select id="p2-color"><option value="0xff3300">Red</option><option value="0xff8800">Orange</option><option value="0x333333">Black</option></select>
            <select id="p2-wep"><option value="kat">Katana</option><option value="zwei">Zweihander</option><option value="rap">Rapier</option></select>
        </div>
    </div>
    <button id="start-btn">START BATTLE</button>
</div>

<div id="ko-msg">K.O.</div>
<div id="ui">
    <div class="bar-container">
        <div class="bar-bg"><div id="hp1" class="hp-fill"></div></div>
        <div class="super-bg"><div id="super1" class="super-fill"></div></div>
        <div class="controls-hint">F:Sword | G:Star | H:Heal(Req. 2 Pts)</div>
    </div>
    <div class="bar-container" style="text-align: right;">
        <div class="bar-bg"><div id="hp2" class="hp-fill"></div></div>
        <div class="super-bg"><div id="super2" class="super-fill"></div></div>
        <div class="controls-hint">K:Sword | L:Star | P:Heal(Req. 2 Pts)</div>
    </div>
</div>

<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

<script type="module">
    import * as THREE from 'three';

    const SWORDS = {
        kat: { dmg: 15, speed: 0.2, range: 2.2, scale: [0.05, 2, 0.05] },
        zwei: { dmg: 35, speed: 0.08, range: 3.2, scale: [0.12, 3, 0.12] },
        rap: { dmg: 18, speed: 0.3, range: 2.8, scale: [0.03, 2.4, 0.03] }
    };

    let roundActive = true;
    const projectiles = [];

    const scene = new THREE.Scene(); scene.background = new THREE.Color(0x222222);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight); renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const sun = new THREE.DirectionalLight(0xffffff, 1.2); sun.position.set(5, 15, 5); sun.castShadow = true; scene.add(sun);
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x333333 }));
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

    class Fighter {
        constructor(x, id) {
            this.id = id; this.startX = x; this.hp = 100; this.pts = 0; this.dead = false;
            this.vel = new THREE.Vector3(); this.group = new THREE.Group();
            this.atkPhase = 0; this.hitMark = false; scene.add(this.group);
        }
        init(color, wepKey) {
            this.group.clear(); this.group.position.set(this.startX, 0, 0);
            this.hp = 100; this.pts = 0; this.dead = false; this.wep = SWORDS[wepKey];
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.5), new THREE.MeshStandardMaterial({ color: parseInt(color) }));
            body.position.y = 1.25; body.castShadow = true; this.group.add(body);
            this.pivot = new THREE.Group(); this.pivot.position.set(0.6, 1.4, 0);
            const blade = new THREE.Mesh(new THREE.BoxGeometry(...this.wep.scale), new THREE.MeshStandardMaterial({ color: 0xcccccc }));
            blade.position.y = this.wep.scale[1]/2; this.pivot.add(blade);
            this.group.add(this.pivot);
        }
        heal() {
            if(this.pts >= 2 && this.hp < 100) {
                this.hp = Math.min(100, this.hp + 20);
                this.pts -= 2;
            }
        }
        shoot(dir) {
            const star = new THREE.Mesh(new THREE.OctahedronGeometry(0.2), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
            star.position.copy(this.group.position).add(new THREE.Vector3(0, 1.5, 0));
            star.userData = { velocity: new THREE.Vector3(dir * 0.7, 0, 0), owner: this.id };
            projectiles.push(star); scene.add(star);
        }
        update(keys, l, r, j, f, g, h) {
            if(this.dead || !roundActive) return;
            if(keys[l]) { this.vel.x = -0.15; this.group.rotation.y = -Math.PI/2; }
            else if(keys[r]) { this.vel.x = 0.15; this.group.rotation.y = Math.PI/2; }
            else this.vel.x *= 0.85;
            if(keys[j] && this.group.position.y <= 0.05) this.vel.y = 0.25;
            
            if(keys[f] && this.atkPhase <= 0) { this.atkPhase = 1; this.hitMark = false; }
            if(keys[g] && this.atkPhase <= 0) { this.shoot(this.group.rotation.y > 0 ? 1 : -1); this.atkPhase = 0.5; }
            if(keys[h]) { this.heal(); keys[h] = false; }
            
            if(this.atkPhase > 0) {
                this.atkPhase -= this.wep.speed;
                this.pivot.rotation.z = Math.sin(this.atkPhase * Math.PI) * 2.5;
            }
            this.vel.y -= 0.01; this.group.position.add(this.vel);
            if(this.group.position.y < 0) { this.group.position.y = 0; this.vel.y = 0; }
        }
    }

    const p1 = new Fighter(-6, 1); const p2 = new Fighter(6, 2);
    const keys = {}; window.onkeydown = (e) => keys[e.code] = true; window.onkeyup = (e) => keys[e.code] = false;

    document.getElementById('start-btn').onclick = () => {
        p1.init(document.getElementById('p1-color').value, document.getElementById('p1-wep').value);
        p2.init(document.getElementById('p2-color').value, document.getElementById('p2-wep').value);
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('ui').style.visibility = 'visible';
        animate();
    };

    function animate() {
        requestAnimationFrame(animate);
        p1.update(keys, 'KeyA', 'KeyD', 'KeyW', 'KeyF', 'KeyG', 'KeyH');
        p2.update(keys, 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'KeyK', 'KeyL', 'KeyP');

        for(let i = projectiles.length-1; i >= 0; i--) {
            const p = projectiles[i]; p.position.add(p.userData.velocity);
            const target = p.userData.owner === 1 ? p2 : p1;
            const attacker = p.userData.owner === 1 ? p1 : p2;
            if(p.position.distanceTo(target.group.position.clone().add(new THREE.Vector3(0,1,0))) < 1) {
                target.hp -= 5; attacker.pts = Math.min(10, attacker.pts + 1); scene.remove(p); projectiles.splice(i, 1);
            } else if(Math.abs(p.position.x) > 40) { scene.remove(p); projectiles.splice(i, 1); }
        }

        const d = p1.group.position.distanceTo(p2.group.position);
        if(p1.atkPhase > 0.4 && p1.atkPhase < 0.7 && !p1.hitMark && d < p1.wep.range) { p2.hp -= p1.wep.dmg; p1.hitMark = true; p1.pts = Math.min(10, p1.pts + 1); }
        if(p2.atkPhase > 0.4 && p2.atkPhase < 0.7 && !p2.hitMark && d < p2.wep.range) { p1.hp -= p2.wep.dmg; p2.hitMark = true; p2.pts = Math.min(10, p2.pts + 1); }

        if((p1.hp <= 0 || p2.hp <= 0) && roundActive) {
            roundActive = false; document.getElementById('ko-msg').style.transform = 'translate(-50%, -50%) scale(1)';
            setTimeout(() => { location.reload(); }, 2000);
        }

        document.getElementById('hp1').style.width = Math.max(0, p1.hp) + '%';
        document.getElementById('hp2').style.width = Math.max(0, p2.hp) + '%';
        document.getElementById('super1').style.width = (p1.pts * 10) + '%';
        document.getElementById('super2').style.width = (p2.pts * 10) + '%';
        camera.position.set((p1.group.position.x + p2.group.position.x)/2, 5, 15);
        camera.lookAt((p1.group.position.x + p2.group.position.x)/2, 2, 0);
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
