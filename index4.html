<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fighter: Mega-Roster</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: 'Orbitron', sans-serif; user-select: none; }
        
        #lobby {
            position: absolute; inset: 0; background: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200;
        }
        .setup-grid { display: flex; gap: 30px; margin-bottom: 20px; }
        .player-setup { background: #f8f9fa; padding: 25px; border-radius: 20px; width: 280px; text-align: center; border: 3px solid #eee; }
        
        select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; border: 2px solid #ddd; }
        #start-btn { background: #00ff88; border: none; font-size: 1.3rem; margin-top: 20px; box-shadow: 0 8px 20px rgba(0,255,136,0.3); }
        #start-btn:hover { transform: translateY(-3px); background: #00eb7d; }

        #scoreboard {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 60px; background: rgba(255,255,255,0.9);
            padding: 15px 40px; border-radius: 50px; border: 3px solid #222; z-index: 100; visibility: hidden;
        }
        .score-box { text-align: center; min-width: 100px; }
        .score-val { font-size: 28px; font-weight: 900; }
        .win-count { color: #ffcc00; font-size: 14px; margin-top: 5px; }

        #ui {
            position: absolute; top: 100px; width: 100%; padding: 0 60px;
            display: flex; justify-content: space-between; box-sizing: border-box;
            pointer-events: none; z-index: 10; visibility: hidden;
        }
        .bar-bg { width: 300px; height: 18px; background: #eee; border-radius: 9px; overflow: hidden; border: 2px solid #333; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        
        #ko-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 120px; font-weight: 900; color: #222; transition: 0.4s; z-index: 150;
            text-shadow: 4px 4px 0px #ddd;
        }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="font-size: 3rem; margin-bottom: 40px;">BATTLE ARENA 3D</h1>
    <div class="setup-grid">
        <div class="player-setup" style="border-color: #0088ff;">
            <h2 style="color:#0088ff">PLAYER 1</h2>
            <label>Color</label>
            <select id="p1-color">
                <option value="0x0088ff">Neon Blue</option>
                <option value="0x00ff88">Acid Green</option>
                <option value="0x7000ff">Power Purple</option>
                <option value="0x333333">Midnight Black</option>
                <option value="0xffffff">Pure White</option>
                <option value="0x00d9ff">Cyber Cyan</option>
            </select>
            <label>Weapon Type</label>
            <select id="p1-wep">
                <option value="longsword">Longsword (Balanced)</option>
                <option value="hammer">War Hammer (Heavy)</option>
                <option value="spear">Spear (Long Range)</option>
                <option value="twins">Twin Blades (Fast)</option>
                <option value="claymore">Claymore (Huge/Slow)</option>
            </select>
        </div>

        <div class="player-setup" style="border-color: #ff4444;">
            <h2 style="color:#ff4444">PLAYER 2</h2>
            <label>Color</label>
            <select id="p2-color">
                <option value="0xff4444">Magma Red</option>
                <option value="0xffaa00">Electric Orange</option>
                <option value="0xff00ff">Hot Pink</option>
                <option value="0x555555">Slate Grey</option>
                <option value="0xbada55">Toxic Lime</option>
                <option value="0x8b4513">Classic Brown</option>
            </select>
            <label>Weapon Type</label>
            <select id="p2-wep">
                <option value="longsword">Longsword (Balanced)</option>
                <option value="hammer">War Hammer (Heavy)</option>
                <option value="spear">Spear (Long Range)</option>
                <option value="twins">Twin Blades (Fast)</option>
                <option value="claymore">Claymore (Huge/Slow)</option>
            </select>
        </div>
    </div>
    <button id="start-btn">ENGAGE COMBAT</button>
</div>

<div id="scoreboard">
    <div class="score-box">
        <div id="p1-title">P1</div>
        <div id="score1" class="score-val">0</div>
        <div id="wins1" class="win-count">WINS: 0</div>
    </div>
    <div class="score-box">
        <div id="p2-title">P2</div>
        <div id="score2" class="score-val">0</div>
        <div id="wins2" class="win-count">WINS: 0</div>
    </div>
</div>

<div id="ko-msg">K.O.</div>

<div id="ui">
    <div class="bar-bg"><div id="hp1" class="hp-fill" style="background: #0088ff;"></div></div>
    <div class="bar-bg"><div id="hp2" class="hp-fill" style="background: #ff4444;"></div></div>
</div>

<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

<script type="module">
    import * as THREE from 'three';

    const WEP_DATA = {
        longsword: { dmg: 18, speed: 0.16, range: 2.3, scale: [0.12, 2.0, 0.12], knock: 0.35 },
        hammer:    { dmg: 45, speed: 0.06, range: 1.8, scale: [0.5, 1.5, 0.5],  knock: 0.8 },
        spear:     { dmg: 12, speed: 0.14, range: 3.5, scale: [0.08, 3.2, 0.08], knock: 0.2 },
        twins:     { dmg: 8,  speed: 0.28, range: 1.6, scale: [0.06, 1.2, 0.06], knock: 0.15 },
        claymore:  { dmg: 32, speed: 0.09, range: 3.0, scale: [0.2, 2.8, 0.2],  knock: 0.5 }
    };

    let p1Pts = 0, p2Pts = 0, p1Wins = 0, p2Wins = 0, roundActive = true;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(10, 20, 10); sun.castShadow = true;
    scene.add(sun);

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshStandardMaterial({ color: 0xf0f0f0 }));
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
    scene.add(floor);
    scene.add(new THREE.GridHelper(80, 40, 0xdddddd, 0xeeeeee));

    class Fighter {
        constructor(x, id) {
            this.id = id; this.startX = x;
            this.hp = 100; this.dead = false;
            this.vel = new THREE.Vector3();
            this.group = new THREE.Group();
            this.atkPhase = 0; this.hitMark = false;
            scene.add(this.group);
        }

        init(color, wepType) {
            this.group.clear();
            this.group.position.set(this.startX, 0, 0);
            this.group.rotation.set(0,0,0);
            this.hp = 100; this.dead = false; this.vel.set(0,0,0);
            this.stats = WEP_DATA[wepType];

            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.5), new THREE.MeshStandardMaterial({ color: parseInt(color) }));
            body.position.y = 1.25; body.castShadow = true;
            this.group.add(body);

            this.wepPivot = new THREE.Group();
            this.wepPivot.position.set(0.6, 1.4, 0);
            const wep = new THREE.Mesh(new THREE.BoxGeometry(...this.stats.scale), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            wep.position.y = this.stats.scale[1]/2;
            this.wepPivot.add(wep);
            this.group.add(this.wepPivot);
        }

        update(keys, l, r, j, f) {
            if(this.dead) { this.group.rotation.z += (Math.PI/2 - this.group.rotation.z)*0.1; return; }
            if(!roundActive) return;

            if(keys[l]) { this.vel.x = -0.16; this.group.rotation.y = -Math.PI/2; }
            else if(keys[r]) { this.vel.x = 0.16; this.group.rotation.y = Math.PI/2; }
            else this.vel.x *= 0.85;

            if(keys[j] && this.group.position.y <= 0.05) this.vel.y = 0.26;
            if(keys[f] && this.atkPhase <= 0) { this.atkPhase = 1; this.hitMark = false; }
            
            if(this.atkPhase > 0) {
                this.atkPhase -= this.stats.speed;
                this.wepPivot.rotation.z = Math.sin(this.atkPhase * Math.PI) * 2.8;
            }

            this.vel.y -= 0.01;
            this.group.position.add(this.vel);
            if(this.group.position.y < 0) { this.group.position.y = 0; this.vel.y = 0; }
        }
    }

    const p1 = new Fighter(-7, 1);
    const p2 = new Fighter(7, 2);
    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    document.getElementById('start-btn').onclick = () => {
        p1.init(document.getElementById('p1-color').value, document.getElementById('p1-wep').value);
        p2.init(document.getElementById('p2-color').value, document.getElementById('p2-wep').value);
        
        document.getElementById('hp1').style.background = '#' + document.getElementById('p1-color').value.slice(2);
        document.getElementById('hp2').style.background = '#' + document.getElementById('p2-color').value.slice(2);
        
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('ui').style.visibility = 'visible';
        document.getElementById('scoreboard').style.visibility = 'visible';
        animate();
    };

    function resetRound() {
        roundActive = false;
        document.getElementById('ko-msg').style.transform = 'translate(-50%, -50%) scale(1)';
        setTimeout(() => {
            document.getElementById('ko-msg').style.transform = 'translate(-50%, -50%) scale(0)';
            p1.init(document.getElementById('p1-color').value, document.getElementById('p1-wep').value);
            p2.init(document.getElementById('p2-color').value, document.getElementById('p2-wep').value);
            roundActive = true;
        }, 2500);
    }

    function animate() {
        requestAnimationFrame(animate);
        p1.update(keys, 'KeyA', 'KeyD', 'KeyW', 'KeyF');
        p2.update(keys, 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'KeyK');

        const dist = p1.group.position.distanceTo(p2.group.position);
        
        const checkHit = (atk, def, dir) => {
            if(atk.atkPhase > 0.4 && atk.atkPhase < 0.7 && !atk.hitMark && dist < atk.stats.range) {
                def.hp -= atk.stats.dmg; atk.hitMark = true; def.vel.x = dir * atk.stats.knock;
                if(def.hp <= 0 && roundActive) {
                    def.dead = true;
                    if(atk.id === 1) { p1Pts += 100; p1Wins++; } 
                    else { p2Pts += 100; p2Wins++; }
                    updateScore();
                    resetRound();
                }
            }
        };

        checkHit(p1, p2, 1);
        checkHit(p2, p1, -1);

        document.getElementById('hp1').style.width = Math.max(0, p1.hp) + '%';
        document.getElementById('hp2').style.width = Math.max(0, p2.hp) + '%';

        camera.position.set((p1.group.position.x + p2.group.position.x)/2, 6, 16);
        camera.lookAt((p1.group.position.x + p2.group.position.x)/2, 2, 0);
        renderer.render(scene, camera);
    }

    function updateScore() {
        document.getElementById('score1').innerText = p1Pts;
        document.getElementById('score2').innerText = p2Pts;
        document.getElementById('wins1').innerText = "WINS: " + p1Wins;
        document.getElementById('wins2').innerText = "WINS: " + p2Wins;
    }
</script>
</body>
</html>
