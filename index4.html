<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Arcade Fighter: Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: 'Orbitron', sans-serif; user-select: none; }
        
        /* Selection Lobby */
        #lobby {
            position: absolute; inset: 0; background: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200;
        }
        .setup-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .player-setup { background: #f4f4f4; padding: 20px; border-radius: 15px; width: 220px; text-align: center; border: 2px solid #ddd; }
        select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; }
        #start-btn { background: #00ff88; border: none; font-size: 1.2rem; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,255,136,0.4); }

        /* Score & UI */
        #scoreboard {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 40px; background: rgba(255,255,255,0.8);
            padding: 10px 30px; border-radius: 50px; border: 2px solid #333; z-index: 100; visibility: hidden;
        }
        .score-box { text-align: center; }
        .score-val { font-size: 24px; font-weight: 900; color: #222; }

        #ui {
            position: absolute; top: 80px; width: 100%; padding: 0 50px;
            display: flex; justify-content: space-between; box-sizing: border-box;
            pointer-events: none; z-index: 10; visibility: hidden;
        }
        .player-card { width: 250px; }
        .bar-bg { width: 100%; height: 15px; background: #eee; border-radius: 10px; overflow: hidden; border: 1px solid #ccc; }
        .hp-fill { height: 100%; width: 100%; background: #ff4444; transition: width 0.2s; }
        
        #ko-message {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 100px; font-weight: 900; color: #222; transition: 0.4s; z-index: 150;
            text-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div id="lobby">
    <h1>STREET FIGHTER 3D</h1>
    <div class="setup-container">
        <div class="player-setup">
            <h3 style="color:#0088ff">P1</h3>
            <select id="p1-color"><option value="0x0088ff">Blue</option><option value="0x00ffcc">Teal</option></select>
            <select id="p1-wep"><option value="katana">Katana</option><option value="mace">Mace</option></select>
        </div>
        <div class="player-setup">
            <h3 style="color:#ff4444">P2</h3>
            <select id="p2-color"><option value="0xff4444">Red</option><option value="0xffaa00">Orange</option></select>
            <select id="p2-wep"><option value="katana">Katana</option><option value="mace">Mace</option></select>
        </div>
    </div>
    <button id="start-btn">START MATCH</button>
</div>

<div id="scoreboard">
    <div class="score-box"><div>P1 SCORE</div><div id="score1" class="score-val">0</div></div>
    <div class="score-box"><div>P2 SCORE</div><div id="score2" class="score-val">0</div></div>
</div>

<div id="ko-message">K.O.</div>

<div id="ui">
    <div class="player-card">
        <div class="bar-bg"><div id="hp1" class="hp-fill"></div></div>
    </div>
    <div class="player-card" style="text-align: right;">
        <div class="bar-bg"><div id="hp2" class="hp-fill"></div></div>
    </div>
</div>

<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

<script type="module">
    import * as THREE from 'three';

    const WEP_STATS = {
        katana: { dmg: 15, speed: 0.18, range: 2.2, scale: [0.1, 1.8, 0.1] },
        mace:   { dmg: 35, speed: 0.07, range: 1.8, scale: [0.3, 1.4, 0.3] }
    };

    let p1Score = 0, p2Score = 0, roundActive = true;

    // --- SCENE SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1));
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(5, 15, 5); sun.castShadow = true;
    scene.add(sun);

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), new THREE.MeshStandardMaterial({ color: 0xeeeeee }));
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
    scene.add(floor);
    scene.add(new THREE.GridHelper(60, 30, 0xdddddd, 0xeeeeee));

    // --- FIGHTER CLASS ---
    class Fighter {
        constructor(startX, id) {
            this.id = id; this.startX = startX;
            this.hp = 100; this.dead = false;
            this.vel = new THREE.Vector3();
            this.group = new THREE.Group();
            this.atkPhase = 0; this.hitMark = false;
            scene.add(this.group);
        }

        init(color, wepType) {
            this.group.clear(); // Clear old parts for reset
            this.group.position.set(this.startX, 0, 0);
            this.group.rotation.set(0,0,0);
            this.hp = 100; this.dead = false; this.vel.set(0,0,0);
            this.stats = WEP_STATS[wepType];

            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.5), new THREE.MeshStandardMaterial({ color: parseInt(color) }));
            body.position.y = 1.25; body.castShadow = true;
            this.group.add(body);

            this.wepPivot = new THREE.Group();
            this.wepPivot.position.set(0.6, 1.3, 0);
            const wep = new THREE.Mesh(new THREE.BoxGeometry(...this.stats.scale), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            wep.position.y = this.stats.scale[1]/2;
            this.wepPivot.add(wep);
            this.group.add(this.wepPivot);
        }

        update(keys, l, r, j, f) {
            if(this.dead) { this.group.rotation.z += (Math.PI/2 - this.group.rotation.z)*0.1; return; }
            if(!roundActive) return;

            if(keys[l]) { this.vel.x = -0.15; this.group.rotation.y = -Math.PI/2; }
            else if(keys[r]) { this.vel.x = 0.15; this.group.rotation.y = Math.PI/2; }
            else this.vel.x *= 0.85;

            if(keys[j] && this.group.position.y <= 0.05) this.vel.y = 0.25;
            if(keys[f] && this.atkPhase <= 0) { this.atkPhase = 1; this.hitMark = false; }
            
            if(this.atkPhase > 0) {
                this.atkPhase -= this.stats.speed;
                this.wepPivot.rotation.z = Math.sin(this.atkPhase * Math.PI) * 2.5;
            }

            this.vel.y -= 0.01;
            this.group.position.add(this.vel);
            if(this.group.position.y < 0) { this.group.position.y = 0; this.vel.y = 0; }
        }
    }

    const p1 = new Fighter(-6, 1);
    const p2 = new Fighter(6, 2);
    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    document.getElementById('start-btn').onclick = () => {
        p1.init(document.getElementById('p1-color').value, document.getElementById('p1-wep').value);
        p2.init(document.getElementById('p2-color').value, document.getElementById('p2-wep').value);
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('ui').style.visibility = 'visible';
        document.getElementById('scoreboard').style.visibility = 'visible';
        animate();
    };

    function resetRound() {
        roundActive = false;
        document.getElementById('ko-message').style.transform = 'translate(-50%, -50%) scale(1)';
        
        setTimeout(() => {
            document.getElementById('ko-message').style.transform = 'translate(-50%, -50%) scale(0)';
            p1.init(document.getElementById('p1-color').value, document.getElementById('p1-wep').value);
            p2.init(document.getElementById('p2-color').value, document.getElementById('p2-wep').value);
            roundActive = true;
        }, 3000);
    }

    function animate() {
        requestAnimationFrame(animate);
        p1.update(keys, 'KeyA', 'KeyD', 'KeyW', 'KeyF');
        p2.update(keys, 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'KeyK');

        const dist = p1.group.position.distanceTo(p2.group.position);
        
        const checkHit = (atk, def, dir) => {
            if(atk.atkPhase > 0.4 && atk.atkPhase < 0.7 && !atk.hitMark && dist < atk.stats.range) {
                def.hp -= atk.stats.dmg; atk.hitMark = true; def.vel.x = dir * 0.4;
                if(def.hp <= 0 && roundActive) {
                    def.dead = true;
                    if(atk.id === 1) { p1Score += 100; p2Score = Math.max(0, p2Score - 50); }
                    else { p2Score += 100; p1Score = Math.max(0, p1Score - 50); }
                    updateScore();
                    resetRound();
                }
            }
        };

        checkHit(p1, p2, 1);
        checkHit(p2, p1, -1);

        document.getElementById('hp1').style.width = Math.max(0, p1.hp) + '%';
        document.getElementById('hp2').style.width = Math.max(0, p2.hp) + '%';

        camera.position.set((p1.group.position.x + p2.group.position.x)/2, 5, 15);
        camera.lookAt((p1.group.position.x + p2.group.position.x)/2, 2, 0);
        renderer.render(scene, camera);
    }

    function updateScore() {
        document.getElementById('score1').innerText = p1Score;
        document.getElementById('score2').innerText = p2Score;
    }
</script>
</body>
</html>
